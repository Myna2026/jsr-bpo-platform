<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSR Setup</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:#1a2030;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:28px;width:100%;max-width:420px;}
h1{font-size:20px;font-weight:800;margin-bottom:6px;}
p{font-size:13px;color:#64748b;margin-bottom:20px;line-height:1.6;}
label{display:block;font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:5px;}
input{width:100%;padding:11px 13px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:#0f1117;color:#e2e8f0;font-size:14px;outline:none;margin-bottom:12px;}
button{width:100%;padding:13px;border:none;border-radius:8px;background:linear-gradient(135deg,#1d4ed8,#7c3aed);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;}
.ok{margin-top:14px;padding:12px;border-radius:8px;background:rgba(34,197,94,.15);color:#22c55e;font-size:13px;font-weight:600;display:none;text-align:center;}
.link{display:block;margin-top:14px;text-align:center;color:#3b82f6;font-size:13px;text-decoration:none;}
</style>
</head>
<body>
<div class="card">
  <h1>⬡ JSR — Mitarbeiter anlegen</h1>
  <p>Legt einen Mitarbeiter direkt im localStorage an — sofort im Mitarbeiter Portal nutzbar.</p>
  <label>Mitarbeiternummer</label>
  <input id="num" value="abc" placeholder="z.B. abc"/>
  <label>Vorname</label>
  <input id="fn" value="Test" placeholder="Vorname"/>
  <label>Nachname</label>
  <input id="ln" value="User" placeholder="Nachname"/>
  <label>Portal-Passwort</label>
  <input id="pw" value="123" placeholder="Passwort"/>
  <label>Projekt</label>
  <select id="proj" style="width:100%;padding:11px 13px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:#0f1117;color:#e2e8f0;font-size:14px;margin-bottom:12px;">
    <option value="p1">Holidaycheck</option>
    <option value="p2">Giga</option>
  </select>
  <button onclick="create()">✓ Mitarbeiter anlegen</button>
  <div class="ok" id="ok"></div>
  <a class="link" href="mitarbeiter.html">→ Zum Mitarbeiter Portal</a>
</div>
<script>
function create(){
  var num=document.getElementById('num').value.trim();
  var fn=document.getElementById('fn').value.trim();
  var ln=document.getElementById('ln').value.trim();
  var pw=document.getElementById('pw').value.trim();
  var proj=document.getElementById('proj').value;
  if(!num||!pw){alert('Bitte Mitarbeiternummer und Passwort eingeben.');return;}
  var emps=[];
  try{emps=JSON.parse(localStorage.getItem('jsr_employees_v1')||'[]');}catch(e){}
  // Remove existing with same number
  emps=emps.filter(function(e){return e.staff_number!==num;});
  emps.push({
    id:'emp_'+num+'_'+Date.now(),
    staff_number:num,
    first_name:fn||'Mitarbeiter',
    last_name:ln||'',
    email:fn.toLowerCase()+'@jsr-bpo.com',
    phone:'',position:'Agent',location:'Tirana',
    language_level:'B2',languages_str:'Albanisch, Deutsch (B2)',
    project_id:proj,primary_skill:'support',
    status:'active',work_hours:'8',
    photo_color:'#1d4ed8',portal_password:pw,
    salary_active:'',bank_name:'',
  });
  localStorage.setItem('jsr_employees_v1',JSON.stringify(emps));
  var ok=document.getElementById('ok');
  ok.textContent='✓ Mitarbeiter #'+num+' angelegt — Login: '+num+' / '+pw;
  ok.style.display='block';
}
</script>
</body>
</html>
