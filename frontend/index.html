<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSR — Johannes BPO Intelligence</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f9fc;--card:#fff;--border:#e5e7eb;--border2:#d1d5db;
  --text:#111827;--muted:#6b7280;--dim:#9ca3af;
  --blue:#2563eb;--blue-bg:#eff6ff;
  --green:#16a34a;--green-bg:#f0fdf4;
  --amber:#d97706;--amber-bg:#fffbeb;
  --red:#dc2626;--red-bg:#fef2f2;
  --purple:#7c3aed;--purple-bg:#f5f3ff;
  --teal:#0d9488;--teal-bg:#f0fdfa;
  --font-mono:'DM Mono',monospace;--font-body:'DM Sans',sans-serif;
  --r:10px;--r-lg:14px;--r-xl:18px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08);
  --shadow-lg:0 8px 30px rgba(0,0,0,.12);
}
html{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh}

/* Login */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f1f3d 0%,#1e3a5f 50%,#2563eb 100%);padding:20px;position:relative;overflow:hidden}
.login-wrap::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 70% 30%,rgba(99,102,241,.15) 0%,transparent 60%)}
.login-box{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:420px;box-shadow:0 24px 80px rgba(0,0,0,.25);position:relative;z-index:1}
.login-logo-wrap{text-align:center;margin-bottom:32px}
.login-logo-badge{display:inline-block;padding:8px 16px;background:linear-gradient(135deg,#1e3a5f,#2563eb);border-radius:10px;color:#fff;font-size:18px;font-weight:800;letter-spacing:.08em;font-family:var(--font-mono);margin-bottom:12px}
.login-title{font-size:24px;font-weight:700;color:var(--text)}
.login-sub{font-size:13px;color:var(--muted);margin-top:4px}
.login-section{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.login-team-btn{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--r);border:1.5px solid var(--border);background:#fff;cursor:pointer;font-family:var(--font-body);transition:all .15s;width:100%;text-align:left;margin-bottom:8px}
.login-team-btn:hover{border-color:var(--blue);background:var(--blue-bg);transform:translateX(2px)}
.login-team-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.login-team-name{font-size:13px;font-weight:600;color:var(--text)}
.login-team-role{font-size:11px;color:var(--muted);margin-top:1px}

/* App Shell */
.app-shell{min-height:100vh;display:flex;flex-direction:column}

/* Header */
.header{background:linear-gradient(135deg,#0f1f3d,#1e3a5f);padding:0;flex-shrink:0;box-shadow:0 2px 20px rgba(0,0,0,.2)}
.header-inner{max-width:1400px;margin:0 auto;padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:60px}
.header-logo{display:flex;align-items:center;gap:12px}
.header-badge{background:linear-gradient(135deg,#2563eb,#7c3aed);border-radius:8px;padding:5px 11px;font-size:13px;font-weight:800;color:#fff;letter-spacing:.08em;font-family:var(--font-mono)}
.header-name{font-size:16px;font-weight:700;color:#fff}
.header-tagline{font-size:11px;color:rgba(255,255,255,.5);margin-top:1px}
.header-right{display:flex;align-items:center;gap:12px}
.header-user{display:flex;align-items:center;gap:8px;padding:6px 12px;background:rgba(255,255,255,.1);border-radius:var(--r);cursor:pointer;transition:background .15s}
.header-user:hover{background:rgba(255,255,255,.15)}
.header-user-name{font-size:12px;color:#fff;font-weight:500}
.header-date{font-size:11px;color:rgba(255,255,255,.5)}

/* Hero */
.hero{background:linear-gradient(135deg,#0f1f3d 0%,#1e3a5f 60%,#1e40af 100%);padding:48px 28px 56px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;right:-80px;bottom:-80px;width:400px;height:400px;background:radial-gradient(circle,rgba(99,102,241,.15),transparent 70%);pointer-events:none}
.hero-inner{max-width:1400px;margin:0 auto;position:relative;z-index:1}
.hero-greeting{font-size:13px;color:rgba(255,255,255,.6);font-weight:500;margin-bottom:8px;letter-spacing:.04em}
.hero-title{font-size:32px;font-weight:800;color:#fff;margin-bottom:6px;line-height:1.2}
.hero-sub{font-size:14px;color:rgba(255,255,255,.6);margin-bottom:32px}
.hero-stats{display:flex;gap:20px;flex-wrap:wrap}
.hero-stat{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:var(--r-lg);padding:14px 20px;backdrop-filter:blur(10px)}
.hero-stat-val{font-size:26px;font-weight:800;color:#fff;font-family:var(--font-mono)}
.hero-stat-label{font-size:11px;color:rgba(255,255,255,.55);margin-top:3px}

/* Content */
.content{flex:1;padding:28px;max-width:1400px;margin:0 auto;width:100%}

/* Section */
.section-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* App Tiles */
.tiles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:32px}
.tile{background:var(--card);border:1px solid var(--border);border-radius:var(--r-xl);box-shadow:var(--shadow);overflow:hidden;cursor:pointer;transition:all .2s;position:relative}
.tile:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.tile-active{border-color:transparent}
.tile-soon{opacity:.6;cursor:default}
.tile-soon:hover{transform:none;box-shadow:var(--shadow)}
.tile-header{padding:20px 20px 0}
.tile-icon-wrap{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:14px}
.tile-name{font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px}
.tile-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:14px}
.tile-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:#fafafa}
.tile-badge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em}
.tile-arrow{color:var(--muted);font-size:16px;transition:transform .15s}
.tile:hover .tile-arrow{transform:translateX(3px);color:var(--blue)}
.tile-features{display:flex;flex-wrap:wrap;gap:5px;padding:0 20px 16px}
.tile-feat{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--bg);border:1px solid var(--border);color:var(--muted)}

/* Quicklinks */
.quicklinks{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px}
.ql{display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:var(--r);background:var(--card);border:1px solid var(--border);cursor:pointer;font-size:12px;font-weight:500;color:var(--muted);transition:all .15s;box-shadow:var(--shadow)}
.ql:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}

/* Activity */
.activity-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.activity-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.activity-text{font-size:13px;color:var(--text);line-height:1.4}
.activity-time{font-size:11px;color:var(--muted);margin-top:2px}

/* Mobile */
@media(max-width:768px){
  .hero{padding:28px 16px 36px}
  .hero-title{font-size:24px}
  .hero-stats{gap:10px}
  .hero-stat{padding:10px 14px}
  .hero-stat-val{font-size:20px}
  .content{padding:16px}
  .tiles-grid{grid-template-columns:1fr}
  .header-inner{padding:0 16px}
  .header-name,.header-tagline{display:none}
  .hero-inner{padding:0}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect} = React;

const TEAMS = [
  {id:'management',name:'Management',role:'Vollzugriff',icon:'👔',color:'#1e3a5f'},
  {id:'recruiting',name:'Recruiting',role:'Recruiting & CVs',icon:'🔍',color:'#2563eb'},
  {id:'operations',name:'Operations',role:'Betrieb & Planung',icon:'⚙️',color:'#0d9488'},
  {id:'finance',name:'Finance',role:'Controlling',icon:'💶',color:'#16a34a'},
  {id:'holidaycheck',name:'HC Team',role:'Holidaycheck Projekt',icon:'🌍',color:'#f97316'},
  {id:'giganetz',name:'GN Team',role:'Giganetz Projekt',icon:'📡',color:'#7c3aed'},
];

const APPS = [
  {
    id:'leads', name:'Lead Research', icon:'🔍', color:'#2563eb', iconBg:'#eff6ff',
    desc:'DACH Tourismusunternehmen durchsuchen, Entscheider finden und qualifizieren.',
    badge:'Aktiv', badgeColor:'#16a34a', badgeBg:'#f0fdf4',
    url:'leads.html',
    features:['246 Unternehmen','341+ Kontakte','Apollo.io Import','Stellenanzeigen-Scanner'],
  },
  {
    id:'hr', name:'HR & Team', icon:'👥', color:'#7c3aed', iconBg:'#f5f3ff',
    desc:'Mitarbeiterverwaltung, Schulungsplanung, Recruiting, Zeiterfassung und mehr.',
    badge:'Aktiv', badgeColor:'#16a34a', badgeBg:'#f0fdf4',
    url:'hr.html',
    features:['Mitarbeiter','Schulungen','Kanban','Skill Matrix','Zeiterfassung','E-Learning'],
  },
  {
    id:'client', name:'Kunden Portal', icon:'🏢', color:'#0d9488', iconBg:'#f0fdfa',
    desc:'Auftraggeber-Login für Holidaycheck und Giganetz mit Steckbriefen, Rechnungen und Kommunikation.',
    badge:'Aktiv', badgeColor:'#16a34a', badgeBg:'#f0fdf4',
    url:'client.html',
    features:['Team-Steckbriefe','Rechnungen','Nachrichten','Kalender','Dokumente'],
  },
  {
    id:'buchhaltung', name:'Buchhaltung', icon:'🧾', color:'#1d4ed8', iconBg:'#eff6ff',
    desc:'Kontoauszüge & Eingangsrechnungen hochladen, KI ordnet automatisch zu — DATEV-Export für die Buchhaltung.',
    badge:'Aktiv', badgeColor:'#16a34a', badgeBg:'#f0fdf4',
    url:'buchhaltung.html',
    features:['Bank-Import CSV','Rechnungen KI-Lesung','Auto-Matching','DATEV Export','Missing-Tracking'],
  },
  {
    id:'mitarbeiter', name:'Mitarbeiter Portal', icon:'👥', color:'#1e3a8a', iconBg:'#eff6ff',
    desc:'Portal für Mitarbeiter — Stammdaten, Schichtplan, Gehaltsabrechnungen, Chat mit Kollegen im gleichen Projekt.',
    badge:'Aktiv', badgeColor:'#16a34a', badgeBg:'#f0fdf4',
    url:'mitarbeiter.html',
    features:['Login MA-Nummer','Schichtplan','Gehaltsarchiv','Projekt-Chat','Gruppen'],
  },
  {
    id:'bewerber', name:'Bewerbungs-LP', icon:'🎯', color:'#059669', iconBg:'#f0fdf4',
    desc:'Landing Page für Bewerber — Stammdaten, Sprachen, Arbeitszeiten, Hörprobe. Pad-optimiert für Vor-Ort oder per Link.',
    badge:'Aktiv', badgeColor:'#16a34a', badgeBg:'#f0fdf4',
    url:'bewerber.html',
    features:['5-Schritt Formular','Hörprobe aufnehmen','Sprachauswahl Flaggen','Direkt ins HR-System'],
  },
  {
    id:'belege', name:'Belege & Kassenzettel', icon:'📷', color:'#7c3aed', iconBg:'#f5f3ff',
    desc:'Kassenbons, Restaurantbelege und Quittungen per Foto scannen — KI liest aus und ordnet automatisch dem Kontoauszug zu.',
    badge:'Aktiv', badgeColor:'#16a34a', badgeBg:'#f0fdf4',
    url:'belege.html',
    features:['Foto-Upload','KI-Auslesen','Auto-Matching Bank','Kreditkarte','Monatsarchiv'],
  },
  {
    id:'active', name:'Active Leads', icon:'📊', color:'#d97706', iconBg:'#fffbeb',
    desc:'Pipeline-Tracking, Call-Protokolle und Follow-up Management für aktive Leads.',
    badge:'Bald', badgeColor:'#d97706', badgeBg:'#fffbeb',
    url:null,
    features:['Pipeline','Call Log','Follow-up','Reporting'],
  },
  {
    id:'rfp', name:'RFPs & Ausschreibungen', icon:'📋', color:'#6366f1', iconBg:'#eef2ff',
    desc:'Öffentliche Ausschreibungen und RFPs für Call Center & BPO automatisch finden.',
    badge:'Bald', badgeColor:'#d97706', badgeBg:'#fffbeb',
    url:null,
    features:['TED Europa','Google News','RSS Feeds','Auto-Scan'],
  },
  {
    id:'analytics', name:'Analytics', icon:'📈', color:'#0891b2', iconBg:'#ecfeff',
    desc:'Umsatz, Kosten, Margen und Performance-Kennzahlen auf einen Blick.',
    badge:'Bald', badgeColor:'#d97706', badgeBg:'#fffbeb',
    url:null,
    features:['Umsatz','Kosten','Marge','Trends'],
  }
];

const QUICKLINKS = [
  {icon:'👥',label:'Mitarbeiter',url:'hr.html#employees'},
  {icon:'📄',label:'CVs',url:'hr.html#cvs'},
  {icon:'🗂',label:'Kanban',url:'hr.html#kanban'},
  {icon:'⏱',label:'Zeiterfassung',url:'hr.html#timetracking'},
  {icon:'🏢',label:'HC Portal',url:'client.html'},
  {icon:'📚',label:'Wissensbasis',url:'hr.html#knowledge'},
  {icon:'📈',label:'Forecast',url:'hr.html#forecast'},
  {icon:'💹',label:'Wirtschaftlichkeit',url:'hr.html#profitability'},
];

function LoginPage({onLogin}){
  return(
    <div className="login-wrap">
      <div className="login-box">
        <div className="login-logo-wrap">
          <div className="login-logo-badge">JSR</div>
          <div className="login-title">Johannes BPO Intelligence</div>
          <div className="login-sub">Internes Management System</div>
        </div>
        <div className="login-section">Team auswählen</div>
        {TEAMS.map(t=>(
          <button key={t.id} className="login-team-btn" onClick={()=>{sessionStorage.setItem('jsr_team',JSON.stringify(t));window.location.href='hr.html';}}>
            <div className="login-team-icon" style={{background:t.color+'18',color:t.color}}>{t.icon}</div>
            <div>
              <div className="login-team-name">{t.name}</div>
              <div className="login-team-role">{t.role}</div>
            </div>
            <span style={{marginLeft:'auto',color:'var(--muted)',fontSize:16}}>→</span>
          </button>
        ))}
        <div style={{marginTop:16,textAlign:'center',fontSize:11,color:'var(--dim)'}}>
          Kein Passwort erforderlich · Nur für internen Gebrauch
        </div>
      </div>
    </div>
  );
}

function Dashboard({team, onLogout}){
  const now = new Date();
  const hour = now.getHours();
  const greeting = hour < 12 ? 'Guten Morgen' : hour < 18 ? 'Guten Tag' : 'Guten Abend';

  // Read some stats from HR localStorage
  const employees = (() => { try{return JSON.parse(localStorage.getItem('jsr_emp_v3')||'[]');}catch{return [];} })();
  const active = employees.filter(e=>e.status==='active').length;
  const training = employees.filter(e=>e.status==='training').length;
  const pipeline = employees.filter(e=>['cv_received','in_system','presented','selected'].includes(e.status)).length;

  const activity = [
    {text:'HR System gestartet — alle Funktionen verfügbar', time:'Gerade eben', color:'var(--green)'},
    {text:`${active} Mitarbeiter aktiv · ${training} in Schulung`, time:'Aktuell', color:'var(--blue)'},
    {text:`${pipeline} Profile in der Recruiting Pipeline`, time:'Aktuell', color:'var(--purple)'},
    {text:'Lead Research: 246 Unternehmen im System', time:'Aktuell', color:'var(--amber)'},
  ];

  return(
    <div className="app-shell">
      {/* Header */}
      <div className="header">
        <div className="header-inner">
          <div className="header-logo">
            <div className="header-badge">JSR</div>
            <div>
              <div className="header-name">Johannes BPO Intelligence</div>
              <div className="header-tagline">Management Platform</div>
            </div>
          </div>
          <div className="header-right">
            <div className="header-date">{now.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})}</div>
            <div className="header-user" onClick={onLogout}>
              <span style={{fontSize:16}}>{team.icon}</span>
              <div>
                <div className="header-user-name">{team.name}</div>
                <div style={{fontSize:10,color:'rgba(255,255,255,.4)'}}>Abmelden</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* Hero */}
      <div className="hero">
        <div className="hero-inner">
          <div className="hero-greeting">{greeting}, {team.name} {team.icon}</div>
          <div className="hero-title">Willkommen im JSR Portal</div>
          <div className="hero-sub">Ihr zentrales Dashboard für Leads, Team, Kunden und Reporting</div>
          <div className="hero-stats">
            {[
              {val:active, label:'Aktive Mitarbeiter'},
              {val:training, label:'In Schulung'},
              {val:pipeline, label:'In Pipeline'},
              {val:246, label:'Lead Unternehmen'},
            ].map((s,i)=>(
              <div key={i} className="hero-stat">
                <div className="hero-stat-val">{s.val}</div>
                <div className="hero-stat-label">{s.label}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div className="content">
        {/* Quicklinks */}
        <div className="quicklinks">
          {QUICKLINKS.map(q=>(
            <div key={q.label} className="ql" onClick={()=>window.location.href=q.url}>
              <span>{q.icon}</span>{q.label}
            </div>
          ))}
        </div>

        {/* Apps */}
        <div className="section-title">Anwendungen</div>
        <div className="tiles-grid">
          {APPS.map(app=>{
            const isActive = !!app.url;
            return(
              <div key={app.id}
                className={`tile ${isActive?'tile-active':'tile-soon'}`}
                onClick={()=>isActive&&(window.location.href=app.url)}
                style={isActive?{borderColor:app.color+'33'}:{}}>
                <div className="tile-header">
                  <div className="tile-icon-wrap" style={{background:app.iconBg,color:app.color}}>{app.icon}</div>
                  <div className="tile-name">{app.name}</div>
                  <div className="tile-desc">{app.desc}</div>
                </div>
                <div className="tile-features">
                  {app.features.map(f=><span key={f} className="tile-feat">{f}</span>)}
                </div>
                <div className="tile-footer" style={isActive?{background:app.color+'08'}:{}}>
                  <span className="tile-badge" style={{background:app.badgeBg,color:app.badgeColor}}>{app.badge}</span>
                  {isActive
                    ? <span className="tile-arrow">→</span>
                    : <span style={{fontSize:11,color:'var(--dim)'}}>In Entwicklung</span>
                  }
                </div>
              </div>
            );
          })}
        </div>

        {/* Activity & Info */}
        <div className="grid-2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:'var(--r-lg)',padding:20,boxShadow:'var(--shadow)'}}>
            <div style={{fontSize:13,fontWeight:600,marginBottom:14}}>⚡ System-Status</div>
            {activity.map((a,i)=>(
              <div key={i} className="activity-item">
                <div className="activity-dot" style={{background:a.color}}/>
                <div>
                  <div className="activity-text">{a.text}</div>
                  <div className="activity-time">{a.time}</div>
                </div>
              </div>
            ))}
          </div>
          <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:'var(--r-lg)',padding:20,boxShadow:'var(--shadow)'}}>
            <div style={{fontSize:13,fontWeight:600,marginBottom:14}}>📋 Ihr Zugang</div>
            <div style={{padding:'14px',background:'var(--bg)',borderRadius:'var(--r)',marginBottom:12}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                <div style={{width:40,height:40,borderRadius:10,background:team.color+'18',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>{team.icon}</div>
                <div>
                  <div style={{fontWeight:600,fontSize:14}}>{team.name}</div>
                  <div style={{fontSize:11,color:'var(--muted)'}}>{team.role}</div>
                </div>
              </div>
              <div style={{fontSize:12,color:'var(--muted)'}}>Kein Passwort · Interner Bereich</div>
            </div>
            <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.8}}>
              <div>🌐 Lead Research → <strong>246</strong> Unternehmen</div>
              <div>👥 HR System → <strong>{active + training}</strong> Mitarbeiter</div>
              <div>🏢 Kundenportale → <strong>2</strong> Auftraggeber</div>
              <div>📅 Letzte Aktualisierung → <strong>Heute</strong></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [team, setTeam] = useState(()=>{
    try{return JSON.parse(sessionStorage.getItem('jsr_team')||'null');}
    catch{return null;}
  });

  useEffect(()=>{
    if(team) sessionStorage.setItem('jsr_team',JSON.stringify(team));
    else sessionStorage.removeItem('jsr_team');
  },[team]);

  if(!team) return <LoginPage onLogin={setTeam}/>;
  return <Dashboard team={team} onLogout={()=>setTeam(null)}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
