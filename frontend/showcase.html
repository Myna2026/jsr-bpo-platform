<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSR BPO — Kandidatenübersicht</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#f0f2f5;color:#111827;-webkit-font-smoothing:antialiased}
.topbar{background:#111318;height:56px;display:flex;align-items:center;
  justify-content:space-between;padding:0 32px;position:sticky;top:0;z-index:10;
  border-bottom:1px solid rgba(255,255,255,.08);box-shadow:0 2px 16px rgba(0,0,0,.3)}
.jsr{width:34px;height:34px;background:linear-gradient(135deg,#1d4ed8,#7c3aed);
  border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;color:#fff;letter-spacing:.04em}
.wrap{max-width:1200px;margin:0 auto;padding:32px 24px}
.header{background:#fff;border-radius:16px;padding:28px 32px;margin-bottom:28px;
  border:1px solid #e5e7eb;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:24px}
.card{background:#fff;border-radius:16px;overflow:hidden;border:1px solid #e5e7eb;
  box-shadow:0 2px 8px rgba(0,0,0,.06);transition:.2s;display:flex;flex-direction:column}
.card:hover{box-shadow:0 8px 28px rgba(0,0,0,.12);transform:translateY(-2px)}
.top{height:110px;display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.av{width:76px;height:76px;border-radius:50%;border:3px solid rgba(255,255,255,.9);
  box-shadow:0 4px 12px rgba(0,0,0,.2);object-fit:cover;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;font-weight:800;color:white}
.body{padding:22px;flex:1;display:flex;flex-direction:column;gap:16px}
.name{font-size:20px;font-weight:800;color:#111827}
.sub{font-size:12px;color:#6b7280;margin-top:2px}
.lbl{font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;
  border-radius:20px;font-size:11px;font-weight:600;margin:2px}
.bar-wrap{display:flex;align-items:center;gap:10px;margin-top:3px}
.bar-bg{flex:1;height:7px;background:#e5e7eb;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.level{font-size:14px;font-weight:800;min-width:32px}
.scores{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:4px}
.score{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:8px 4px;text-align:center}
.score-n{font-size:18px;font-weight:800;line-height:1}
.score-l{font-size:9px;color:#9ca3af;font-weight:600;margin-top:1px;text-transform:uppercase}
.divider{height:1px;background:#f3f4f6;margin:0 -22px}
.media-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;
  border-radius:8px;border:1px solid #e5e7eb;background:#f9fafb;
  color:#374151;font-size:12px;font-weight:600;text-decoration:none;transition:.15s}
.media-btn:hover{background:#ede9fe;border-color:#c4b5fd;color:#7c3aed}
.softbox{background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:11px 13px}
.footer{text-align:center;padding:40px 0 28px;color:#9ca3af;font-size:12px}
</style>
</head>
<body>
<div class="topbar">
  <div style="display:flex;align-items:center;gap:12px">
    <div class="jsr">JSR</div>
    <div>
      <div style="color:rgba(255,255,255,.85);font-size:14px;font-weight:700">JSR BPO Intelligence</div>
      <div style="color:rgba(255,255,255,.35);font-size:10px;letter-spacing:.04em">KANDIDATENÜBERSICHT</div>
    </div>
  </div>
  <div style="color:rgba(255,255,255,.3);font-size:11px">🔒 Vertraulich</div>
</div>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;

function lc(l){return l==='C2'||l==='Muttersprachler'?'#059669':l==='C1'?'#16a34a':l==='B2'?'#2563eb':l==='B1'?'#d97706':l==='A2'?'#dc2626':'#9ca3af';}
function lw(l){return{Muttersprachler:100,C2:100,C1:87,B2:73,B1:58,A2:42,A1:25}[l]||30;}
function wc(w){return w==='Sehr gut'?'#059669':w==='Gut'?'#2563eb':w==='Mittel'?'#d97706':w==='Schwach'?'#dc2626':'#9ca3af';}
function sc(s){return s>=90?'#059669':s>=75?'#2563eb':s>=60?'#d97706':'#dc2626';}
function eduBadge(e){
  if(!e) return null;
  const map={master:{label:'Master',bg:'#ede9fe',col:'#7c3aed'},bachelor:{label:'Bachelor',bg:'#dbeafe',col:'#1d4ed8'},in_progress:{label:'Studium laufend',bg:'#fef3c7',col:'#d97706'},apprenticeship:{label:'Berufsausbildung',bg:'#f0fdf4',col:'#059669'}};
  const d=map[e];
  return d?<span className="badge" style={{background:d.bg,color:d.col}}>🎓 {d.label}</span>:null;
}

function Card({cv,idx}){
  const [exp,setExp]=useState(false);
  const scores=cv.test_scores||{};
  const scoreVals=Object.values(scores).map(Number);
  const avg=scoreVals.length?Math.round(scoreVals.reduce((a,b)=>a+b,0)/scoreVals.length):null;
  const SLBL={grammar:'Grammatik',vocab:'Wortschatz',listening:'Hören',verstehen:'Verstehen',schreiben:'Schreiben',reading:'Lesen',writing:'Schreiben'};
  const wHistory=(cv.work_history||'').split('\n').filter(Boolean);

  return(
    <div className="card">
      <div className="top" style={{background:cv.photo_color||'linear-gradient(135deg,#1d4ed8,#7c3aed)'}}>
        <div className="av" style={{background:cv.photo_url?'transparent':'rgba(255,255,255,.15)'}}>
          {cv.photo_url?<img src={cv.photo_url} style={{width:'100%',height:'100%',borderRadius:'50%',objectFit:'cover'}}/>
            :(cv.first_name||'?')[0]+(cv.last_name||'?')[0]}
        </div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}>
          <div style={{background:'rgba(0,0,0,.25)',borderRadius:20,padding:'3px 10px',
            fontSize:11,fontWeight:700,color:'white'}}>#{idx+1}</div>
          {avg&&<div style={{background:'rgba(255,255,255,.2)',borderRadius:10,
            padding:'5px 12px',textAlign:'center'}}>
            <div style={{fontSize:20,fontWeight:800,color:'white',lineHeight:1}}>{avg}</div>
            <div style={{fontSize:9,color:'rgba(255,255,255,.7)',fontWeight:600,marginTop:2}}>∅ TEST</div>
          </div>}
        </div>
      </div>

      <div className="body">

        {/* Name */}
        <div>
          <div className="name">{cv.first_name} {cv.last_name}</div>
          <div className="sub">{[cv.age&&cv.age+' Jahre',cv.gender,cv.city].filter(Boolean).join(' · ')}</div>
        </div>

        <div className="divider"/>

        {/* Deutsch Sprechen */}
        <div>
          <div className="lbl">Deutsch — Sprechen</div>
          <div className="bar-wrap">
            <span className="level" style={{color:lc(cv.language_level)}}>{cv.language_level||'—'}</span>
            <div className="bar-bg"><div className="bar-fill" style={{width:lw(cv.language_level)+'%',background:lc(cv.language_level)}}/></div>
          </div>
        </div>

        {/* Deutsch Schrift */}
        {cv.writing_level&&(
          <div>
            <div className="lbl">Deutsch — Schrift</div>
            <div className="bar-wrap">
              <span className="level" style={{color:wc(cv.writing_level)}}>{cv.writing_level}</span>
              <div className="bar-bg"><div className="bar-fill" style={{width:({Muttersprachler:100,'Sehr gut':100,C2:100,Gut:75,C1:75,Mittel:50,B2:50,Schwach:25,B1:25,A2:15}[cv.writing_level]||0)+'%',background:wc(cv.writing_level)}}/></div>
            </div>
          </div>
        )}

        {/* Test Scores */}
        {Object.keys(scores).length>0&&(
          <div>
            <div className="lbl">Testergebnis</div>
            <div className="scores">
              {Object.entries(scores).map(([k,v])=>(
                <div key={k} className="score">
                  <div className="score-n" style={{color:sc(Number(v))}}>{v}</div>
                  <div className="score-l">{SLBL[k]||k}</div>
                </div>
              ))}
              {avg&&<div className="score" style={{background:'#f0fdf4',border:'1px solid #bbf7d0'}}>
                <div className="score-n" style={{color:'#059669'}}>{avg}</div>
                <div className="score-l">∅ Ges.</div>
              </div>}
            </div>
          </div>
        )}

        <div className="divider"/>

        {/* Bildung & Badges */}
        <div>
          <div className="lbl">Bildung & Profil</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:3,marginBottom:6}}>
            {eduBadge(cv.education_level||cv.education)}
            {cv.better_phone&&<span className="badge" style={{background:'#dbeafe',color:'#1d4ed8'}}>📞 Telefonstärke</span>}
            {cv.better_email&&<span className="badge" style={{background:'#dbeafe',color:'#1d4ed8'}}>✉ Schriftstärke</span>}
            {cv.is_structured&&<span className="badge" style={{background:'#dcfce7',color:'#059669'}}>✓ Strukturiert</span>}
            {cv.sales_potential&&<span className="badge" style={{background:'#fef3c7',color:'#d97706'}}>⭐ Sales-Potenzial</span>}
          </div>
          {(cv.education&&typeof cv.education==='string'&&cv.education.length>3)&&(
            <div style={{fontSize:12,color:'#374151',marginTop:2}}>🎓 {cv.education}</div>
          )}
        </div>

        {/* Sprachen */}
        {cv.languages_str&&(
          <div>
            <div className="lbl">Sprachen</div>
            <div style={{fontSize:12,color:'#374151',lineHeight:1.7}}>{cv.languages_str}</div>
            {cv.dialect&&<div style={{fontSize:11,color:'#6b7280',marginTop:3}}>💬 Dialekt: <strong>{cv.dialect}</strong></div>}
          </div>
        )}

        {/* Berufserfahrung */}
        {(cv.experience_years||cv.work_history)&&(
          <div>
            <div className="lbl">Berufserfahrung {cv.experience_years?'('+cv.experience_years+' Jahre)':''}</div>
            {wHistory.length>0&&(
              <div style={{display:'flex',flexDirection:'column',gap:3}}>
                {wHistory.map((h,i)=>(
                  <div key={i} style={{fontSize:12,color:'#374151',display:'flex',gap:6,alignItems:'flex-start'}}>
                    <span style={{color:'#9ca3af',flexShrink:0}}>▸</span>
                    <span style={{lineHeight:1.5}}>{h}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* Profil */}
        {cv.notes&&(
          <div>
            <div className="lbl">Persönlichkeit & Stärken</div>
            <div style={{fontSize:12,color:'#374151',lineHeight:1.7,
              display:exp?'block':'-webkit-box',
              WebkitLineClamp:exp?'unset':4,
              WebkitBoxOrient:'vertical',
              overflow:exp?'visible':'hidden'}}>
              {cv.notes}
            </div>
            {cv.notes.length>220&&(
              <button onClick={()=>setExp(e=>!e)}
                style={{fontSize:11,color:'#7c3aed',background:'none',border:'none',
                  cursor:'pointer',marginTop:4,padding:0,fontWeight:600}}>
                {exp?'▲ Weniger':'▼ Mehr lesen'}
              </button>
            )}
          </div>
        )}

        {/* Verfügbarkeit + Homeoffice */}
        {(cv.available_from||cv.homeoffice_pref)&&(
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {cv.available_from&&(
              <span className="badge" style={{background:'#f0fdf4',color:'#059669'}}>
                📅 Verfügbar: {new Date(cv.available_from+'T12:00:00').toLocaleDateString('de-DE',{month:'long',year:'numeric'})}
              </span>
            )}
            {cv.homeoffice_pref&&(
              <span className="badge" style={{background:'#f9fafb',color:'#374151'}}>
                {cv.homeoffice_pref==='vor_ort'?'🏢 Vor Ort':cv.homeoffice_pref==='hybrid'?'🔄 Hybrid':'🏠 Remote'}
              </span>
            )}
          </div>
        )}

        {/* Soft facts */}
        {(cv.dream||cv.hobbies||cv.travel_wish)&&(
          <div className="softbox">
            {cv.dream&&<div style={{fontSize:11,color:'#374151',marginBottom:cv.hobbies?4:0}}>🎯 <em>{cv.dream}</em></div>}
            {cv.hobbies&&<div style={{fontSize:11,color:'#6b7280',marginBottom:cv.travel_wish?3:0}}>❤ {cv.hobbies}</div>}
            {cv.travel_wish&&<div style={{fontSize:11,color:'#6b7280'}}>✈ {cv.travel_wish}</div>}
          </div>
        )}

        {/* Media */}
        {((cv.audios&&cv.audios.length>0)||(cv.videos&&cv.videos.length>0))&&(
          <div>
            <div className="lbl">Medien</div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {(cv.audios||[]).map((a,i)=>(
                <a key={i} href={typeof a==='object'?a.url:a} target="_blank" className="media-btn">
                  🎙 Hörprobe{cv.audios.length>1?' '+(i+1):''}
                </a>
              ))}
              {(cv.videos||[]).map((v,i)=>(
                <a key={i} href={typeof v==='object'?v.url:v} target="_blank" className="media-btn">
                  🎬 Video{cv.videos.length>1?' '+(i+1):''}
                </a>
              ))}
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

function App(){
  const [showcase,setShowcase]=useState(null);
  const [cvList,setCvList]=useState([]);
  const [error,setError]=useState('');

  useEffect(()=>{
    const token=new URLSearchParams(window.location.search).get('token');
    if(!token){setError('Kein gültiger Link.');return;}
    try{
      const showcases=JSON.parse(localStorage.getItem('jsr_showcases_v1')||'[]');
      const sc=showcases.find(s=>s.token===token);
      if(!sc){setError('Showcase nicht gefunden oder abgelaufen.');return;}
      const cvs=JSON.parse(localStorage.getItem('jsr_cvs_v1')||'[]');
      setShowcase(sc);
      setCvList(cvs.filter(c=>sc.cv_ids.includes(c.id)));
    }catch(e){setError('Ladefehler: '+e.message);}
  },[]);

  if(error) return(
    <div style={{textAlign:'center',padding:80}}>
      <div style={{fontSize:48,marginBottom:16}}>🔒</div>
      <div style={{fontSize:18,fontWeight:600,color:'#374151',marginBottom:8}}>{error}</div>
      <div style={{fontSize:13,color:'#9ca3af'}}>Bitte wenden Sie sich an Ihren JSR Ansprechpartner.</div>
    </div>
  );
  if(!showcase) return(
    <div style={{textAlign:'center',padding:80,color:'#9ca3af'}}>
      <div style={{fontSize:32,marginBottom:12}}>⏳</div>Wird geladen…
    </div>
  );

  return(
    <div className="wrap">
      <div className="header">
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:16}}>
          <div style={{flex:1}}>
            <div style={{fontSize:11,fontWeight:700,color:'#7c3aed',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}}>JSR BPO — Kandidatenvorauswahl</div>
            <h1 style={{fontSize:26,fontWeight:800,color:'#111827',marginBottom:6}}>{showcase.title}</h1>
            <div style={{fontSize:13,color:'#6b7280',marginBottom:showcase.note?12:0}}>
              {cvList.length} Kandidat{cvList.length!==1?'en':''} · Erstellt {showcase.created}
            </div>
            {showcase.note&&(
              <div style={{padding:'12px 16px',background:'#f0f9ff',borderRadius:10,
                border:'1px solid #bae6fd',fontSize:13,color:'#0369a1',lineHeight:1.6}}>
                💬 {showcase.note}
              </div>
            )}
          </div>
          <div style={{background:'linear-gradient(135deg,#1d4ed8,#7c3aed)',borderRadius:14,
            padding:'16px 24px',textAlign:'center',color:'white',minWidth:90}}>
            <div style={{fontSize:36,fontWeight:800,lineHeight:1}}>{cvList.length}</div>
            <div style={{fontSize:10,opacity:.7,marginTop:4,fontWeight:600}}>KANDIDATEN</div>
          </div>
        </div>
      </div>
      <div className="grid">
        {cvList.map((cv,i)=><Card key={cv.id} cv={cv} idx={i}/>)}
      </div>
      <div className="footer">
        JSR BPO Intelligence Platform · Vertraulich · Nur für autorisierte Empfänger<br/>
        <span style={{fontSize:11,marginTop:4,display:'block'}}>Bei Fragen wenden Sie sich bitte direkt an Ihren JSR Ansprechpartner.</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
