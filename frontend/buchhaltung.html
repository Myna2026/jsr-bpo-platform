<style>

*{box-sizing:border-box;margin:0;padding:0}
:root{

  --border:#e2e5ea;--border2:#c5cad4;

  --amber:#d97706;--amber-bg:#fffbeb;
  --red:#ef4444;--red-bg:#fef2f2;
  --purple:#7c3aed;--purple-bg:#f5f3ff;
  --teal:#0d9488;--teal-bg:#f0fdfa;

  --r:6px;--r-md:8px;--r-lg:12px;--r-xl:16px;
  --shadow-xs:0 1px 2px rgba(0,0,0,.05);

  --shadow:0 2px 6px rgba(0,0,0,.07),0 1px 3px rgba(0,0,0,.04);

body{font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:13px;-webkit-font-smoothing:antialiased;line-height:1.5}

.s-badge{width:28px;height:28px;background:linear-gradient(135deg,#1d4ed8,#7c3aed);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff}

.ni:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85)}

.s-btn:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.75)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* Progress bars */

/* Form improvements */

.modal-body{padding:18px;overflow-y:auto;flex:1}
.modal-footer{padding:12px 18px;border-top:1px solid #e2e5ea;display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;background:#f9fafb}
.skill-chip{display:inline-flex;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500;background:#eff6ff;color:#1d4ed8;margin:1px}
.warn-box{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 14px;border-radius:8px;margin-bottom:8px;border:1px solid}
.warn-red{background:#fef2f2;border-color:rgba(239,68,68,.2)}

.warn-green{background:#ecfdf5;border-color:rgba(5,150,105,.2)}

.progress-track{width:100%;height:5px;background:#e2e5ea;border-radius:3px;overflow:hidden}

.cal-day:hover{background:#eff6ff;border-color:rgba(29,78,216,.2)}

.cal-day.vacation{background:#fffbeb;border-color:rgba(217,119,6,.2)}
.cal-day.unpaid{background:#f9fafb;border-color:#e2e5ea}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}

.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.btn-green{background:#059669;border-color:#059669;color:#fff}
.btn-green:hover{filter:brightness(.92);color:#fff}
.btn-amber{background:#d97706;border-color:#d97706;color:#fff}
.btn-red{background:#ef4444;border-color:#ef4444;color:#fff}

@media(max-width:768px){
  .layout{flex-direction:column;height:auto;min-height:100vh}
  .sidebar{width:100%!important;min-width:unset!important;height:auto}
  .s-logo{padding:10px 12px}
  .nav{display:flex;flex-direction:row;padding:4px;overflow-x:auto;gap:2px}
  .nav-section{display:none}
  .ni{padding:6px 8px;white-space:nowrap;flex-shrink:0}
  .s-footer{display:none}
  .content{padding:10px 12px}
  .grid-2,.grid-3,.grid-4,.kpi-grid{grid-template-columns:1fr!important}
  .modal{width:95vw!important;max-height:92vh!important}

}

.bk-header{background:linear-gradient(135deg,#1d4ed8,#7c3aed);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.bk-content{max-width:1500px;margin:0 auto;padding:24px;}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;
function InvoiceView(){
  const COMPANIES = [
    {id:'parklane1', name:'Parklane GmbH'},
    {id:'parklane2', name:'Parklane Zwei GmbH'},
    {id:'parklane3', name:'Parklane Drei GmbH'},
    {id:'parklane4', name:'Parklane Vier GmbH'},
  ];

  const [company, setCompany] = useState(()=>localStorage.getItem('jsr_bk_company')||'parklane1');
  const [month, setMonth] = useState(()=>{
    const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  });
  const [apiKey, setApiKey] = useState(()=>localStorage.getItem('jsr_anthropic_key')||'');
  const [showKeyInput, setShowKeyInput] = useState(false);
  const [processing, setProcessing] = useState(false);
  const [processLog, setProcessLog] = useState([]);
  const [activeUpload, setActiveUpload] = useState(null); // 'bank' | 'invoices'

  const [bankTx, setBankTx] = useState(()=>{
    const co=localStorage.getItem('jsr_bk_company')||'parklane1';
    try{return JSON.parse(localStorage.getItem('jsr_bank_tx_'+co+'_v1')||'{}');}catch{return {};}
  });
  const [invoices, setInvoices] = useState(()=>{
    const co=localStorage.getItem('jsr_bk_company')||'parklane1';
    try{return JSON.parse(localStorage.getItem('jsr_invoices_'+co+'_v1')||'{}');}catch{return {};}
  });
  const [showSidebar, setShowSidebar] = useState(true);

  function changeCompany(newCo){
    localStorage.setItem('jsr_bk_company', newCo);
    setCompany(newCo);
    // Reload data for new company
    try{setBankTx(JSON.parse(localStorage.getItem('jsr_bank_tx_'+newCo+'_v1')||'{}'));}catch{setBankTx({});}
    try{setInvoices(JSON.parse(localStorage.getItem('jsr_invoices_'+newCo+'_v1')||'{}'));}catch{setInvoices({});}
  }
  const [showDatevPreview, setShowDatevPreview] = useState(false);

  // Global running invoice counter across ALL months
  function getNextGlobalNumber(){
    try{
      const all = JSON.parse(localStorage.getItem('jsr_invoices_'+company+'_v1')||'{}');
      let max = 0;
      Object.values(all).forEach(monthInvs=>{
        (monthInvs||[]).forEach(inv=>{
          if(inv.global_nr && inv.global_nr>max) max=inv.global_nr;
        });
      });
      return max+1;
    }catch{return 1;}
  }

  // Generate document name: JSR-YYYY-NNN_FirmaKurz
  function genDocName(inv, globalNr){
    const firma = (inv.firma||'Unbekannt').replace(/[^a-zA-Z0-9]/g,'').slice(0,12);
    const year = (inv.rechnungsdatum||month).slice(0,4);
    return 'JSR-'+year+'-'+String(globalNr).padStart(4,'0')+'_'+firma;
  }

  useEffect(()=>{localStorage.setItem('jsr_bank_tx_'+company+'_v1',JSON.stringify(bankTx));},[bankTx]);
  useEffect(()=>{localStorage.setItem('jsr_invoices_'+company+'_v1',JSON.stringify(invoices));},[invoices]);

  // All months from Jan 2025 up to current month + 1
  const months = (()=>{
    const list=[];
    const now=new Date();
    const start=new Date(2025,0,1);
    const end=new Date(now.getFullYear(),now.getMonth()+1,1);
    let cur=new Date(start);
    while(cur<=end){
      list.push(cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0'));
      cur.setMonth(cur.getMonth()+1);
    }
    return list.reverse(); // newest first
  })();
  function fmtMonth(m){
    const [y,mo]=m.split('-');
    return new Date(y,mo-1,1).toLocaleDateString('de-DE',{month:'long',year:'numeric'});
  }
  function eur(v){return Number(v||0).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';}

  const monthTx = bankTx[month]||[];
  const monthInv = invoices[month]||[];

  // ── BANK CSV PARSER ──────────────────────────────────────────────
  function parseBankCSV(text){
    const lines = text.replace(/\r/g,'').split('\n').filter(l=>l.trim());
    const sep = lines[0].includes(';')?';':',';
    const header = lines[0].split(sep).map(h=>h.replace(/"/g,'').toLowerCase().trim());
    const rows = [];
    for(let i=1;i<lines.length;i++){
      const vals = lines[i].split(sep).map(v=>v.replace(/^"|"$/g,'').trim());
      const row = {};
      header.forEach((h,j)=>{row[h]=vals[j]||'';});
      const date = row['buchungstag']||row['date']||row['datum']||row['valuta']||'';
      const desc = row['verwendungszweck']||row['description']||row['buchungstext']||row['text']||'';
      const amount = parseFloat((row['betrag']||row['amount']||row['umsatz']||'0').replace(',','.').replace(/[^0-9.-]/g,''))||0;
      const creditor = row['beguenstigter/zahlungspflichtiger']||row['empfaenger']||row['name']||row['creditor']||'';
      if((date||desc)&&amount!==0){
        const salaryKw=['gehalt','lohn','salary','wage','entgelt','verg\u00fctung','sozialversicherung','lohnsteuer'];
        const isSalary=salaryKw.some(k=>(desc+' '+creditor).toLowerCase().includes(k));
        rows.push({id:'tx_'+Date.now()+'_'+i, date, desc, amount, creditor,
          type:amount<0?'debit':'credit',
          category:isSalary?'Lohn/Gehalt':'',
          matched_invoice:isSalary?'SALARY':null,
          status:isSalary?'salary':'open'});
      }
    }
    return rows;
  }

  function parseDate(dateStr){
    if(!dateStr) return null;
    const d1 = dateStr.match(/^(\d{1,2})\.(\d{1,2})\.(\d{2,4})$/);
    if(d1){const year=d1[3].length===2?'20'+d1[3]:d1[3];return year+'-'+d1[2].padStart(2,'0');}
    const d2 = dateStr.match(/^(\d{4})-(\d{2})-\d{2}$/);
    if(d2) return d2[1]+'-'+d2[2];
    const d3 = dateStr.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if(d3) return d3[3]+'-'+d3[2].padStart(2,'0');
    return null;
  }

  function handleBankUpload(e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try{
        const text = ev.target.result.replace(/\uFEFF/,'');
        const rows = parseBankCSV(text);

        // Group by actual transaction month from date field
        const byMonth = {};
        rows.forEach(tx=>{
          const txMonth = parseDate(tx.date)||month;
          if(!byMonth[txMonth]) byMonth[txMonth]=[];
          byMonth[txMonth].push(tx);
        });

        const monthsSeen = Object.keys(byMonth).sort();
        let totalMatched = 0;
        const newBankTx = JSON.parse(JSON.stringify(bankTx));
        const newInvoices = JSON.parse(JSON.stringify(invoices));

        monthsSeen.forEach(txMonth=>{
          // Merge with existing, deduplicate by id
          const existing = newBankTx[txMonth]||[];
          const existingIds = new Set(existing.map(t=>t.id));
          const merged = [...existing, ...byMonth[txMonth].filter(t=>!existingIds.has(t.id))];
          newBankTx[txMonth] = merged;

          // Auto-match invoices for this month
          const invList = newInvoices[txMonth]||[];
          invList.forEach(inv=>{
            if(inv.status==='matched') return;
            const amount = Math.abs(inv.bruttobetrag||0);
            const tx = merged.find(t=>
              t.status==='open' &&
              Math.abs(Math.abs(t.amount)-amount)<0.02 &&
              (inv.firma&&(
                t.creditor.toLowerCase().includes((inv.firma||'').toLowerCase().slice(0,5))||
                t.desc.toLowerCase().includes((inv.firma||'').toLowerCase().slice(0,5))||
                (inv.zahlungsreferenz&&t.desc.toLowerCase().includes((inv.zahlungsreferenz||'').toLowerCase().slice(0,8)))
              ))
            );
            if(tx){
              const existing_matched = invList.filter(i=>i.status==='matched').length;
              const datevNr='RE-'+txMonth.replace('-','')+'-'+String(existing_matched+1).padStart(3,'0');
              inv.status='matched'; inv.matched_tx_id=tx.id; inv.datev_number=datevNr;
              tx.status='matched'; tx.matched_invoice=inv.id;
              totalMatched++;
            }
          });
          newInvoices[txMonth] = invList;
        });

        setBankTx(newBankTx);
        setInvoices(newInvoices);

        // Switch to month with most transactions
        const mainMonth = monthsSeen.reduce((a,b)=>(byMonth[a]||[]).length>=(byMonth[b]||[]).length?a:b, monthsSeen[0]);
        setMonth(mainMonth);

        const log = [
          '✓ '+rows.length+' Buchungen importiert',
          '✓ Monate: '+monthsSeen.map(m=>{
            const [y,mo]=m.split('-');
            return new Date(y,mo-1,1).toLocaleDateString('de-DE',{month:'short',year:'numeric'})+' ('+byMonth[m].length+')';
          }).join(', '),
        ];
        if(totalMatched>0) log.push('✓ Auto-Match: '+totalMatched+' Rechnungen zugeordnet');
        setProcessLog(log);
        e.target.value='';
      }catch(err){setProcessLog(['\u2717 Fehler: '+err.message]);}
    };
    reader.readAsText(file,'UTF-8');
  }

  // ── KI INVOICE PARSING ────────────────────────────────────────────
  async function parseInvoiceFile(file){
    if(!apiKey) throw new Error('Kein API-Key — bitte oben eintragen.');
    const isImage = file.type.startsWith('image/');
    const isPDF = file.type==='application/pdf';
    if(!isImage&&!isPDF) return null;
    const base64 = await new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=()=>res(r.result.split(',')[1]);
      r.onerror=rej;
      r.readAsDataURL(file);
    });
    const response = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:[
          {type:isPDF?'document':'image',source:{type:'base64',media_type:file.type,data:base64}},
          {type:'text',text:`Analysiere diese Rechnung und extrahiere als JSON (nur JSON, kein Text darum):
{
  "firma": "Name des Rechnungsstellers",
  "rechnungsnummer": "Rechnungsnummer",
  "rechnungsdatum": "YYYY-MM-DD",
  "faelligkeitsdatum": "YYYY-MM-DD oder null",
  "nettobetrag": 0.00,
  "umsatzsteuer_prozent": 19,
  "umsatzsteuer_betrag": 0.00,
  "bruttobetrag": 0.00,
  "waehrung": "EUR",
  "leistungsbeschreibung": "Was wurde gekauft",
  "iban": "IBAN oder null",
  "zahlungsreferenz": "Verwendungszweck oder null",
  "kategorie": "IT/Miete/Personal/Marketing/Versicherung/Medien/Sonstiges"
}`}
        ]}]
      })
    });
    const data = await response.json();
    const text = data.content?.map(c=>c.text||'').join('');
    return JSON.parse(text.replace(/```json|```/g,'').trim());
  }

  async function handleInvoiceUpload(e){
    const files = Array.from(e.target.files);
    if(!files.length) return;
    setProcessing(true);
    setProcessLog([]);
    const results = [];
    const txList = [...(bankTx[month]||[])];
    let autoMatched = 0;

    for(let i=0;i<files.length;i++){
      const file = files[i];
      setProcessLog(l=>[...l,'⏳ Lese: '+file.name+' ('+i+'1/'+files.length+')...']);
      try{
        const parsed = await parseInvoiceFile(file);
        if(!parsed) continue;

        // Try auto-match against bank transactions
        const amount = Math.abs(parsed.bruttobetrag||0);
        const tx = txList.find(t=>
          t.status==='open' &&
          Math.abs(Math.abs(t.amount)-amount)<0.02 &&
          (parsed.firma&&(
            t.creditor.toLowerCase().includes((parsed.firma||'').toLowerCase().slice(0,5))||
            t.desc.toLowerCase().includes((parsed.firma||'').toLowerCase().slice(0,5))||
            (parsed.zahlungsreferenz&&t.desc.toLowerCase().includes((parsed.zahlungsreferenz||'').toLowerCase().slice(0,8)))
          ))
        );

        const existingMatched = results.filter(r=>r.status==='matched').length +
          (invoices[month]||[]).filter(r=>r.status==='matched').length;
        const datevNr = tx ? 'RE-'+month.replace('-','')+'-'+String(existingMatched+autoMatched+1).padStart(3,'0') : null;

        if(tx){
          tx.status='matched';
          autoMatched++;
        }

        const globalNr = getNextGlobalNumber() + results.length;
        const docName = genDocName(parsed, globalNr);
        const inv = {
          id:'inv_'+Date.now()+'_'+i,
          filename:file.name,
          doc_name: docName,
          global_nr: globalNr,
          month,
          status: tx?'matched':'unmatched',
          matched_tx_id: tx?tx.id:null,
          datev_number: datevNr,
          ...parsed,
          uploaded_at:new Date().toISOString(),
        };
        results.push(inv);
        setProcessLog(l=>[...l,'✓ '+parsed.firma+' | '+eur(parsed.bruttobetrag)+(tx?' → ✅ Zugeordnet':' → ○ Kein Match')]);
      }catch(err){
        setProcessLog(l=>[...l,'✗ '+file.name+': '+err.message]);
      }
    }

    setBankTx(prev=>({...prev,[month]:txList}));
    setInvoices(prev=>({...prev,[month]:[...(prev[month]||[]),...results]}));
    setProcessing(false);
    e.target.value='';
  }

  // ── MANUAL ACTIONS ────────────────────────────────────────────────
  function toggleStatus(invId, newStatus){
    setInvoices(prev=>({...prev,[month]:(prev[month]||[]).map(i=>{
      if(i.id!==invId) return i;
      if(newStatus==='matched'){
        // find a candidate tx
        const txList = bankTx[month]||[];
        const amount = Math.abs(i.bruttobetrag||0);
        const tx = txList.find(t=>t.status==='open'&&Math.abs(Math.abs(t.amount)-amount)<1);
        if(tx){
          setBankTx(prev=>({...prev,[month]:(prev[month]||[]).map(t=>t.id===tx.id?{...t,status:'matched',matched_invoice:invId}:t)}));
          const n = (prev[month]||[]).filter(x=>x.status==='matched').length+1;
          return {...i,status:'matched',matched_tx_id:tx.id,datev_number:'RE-'+month.replace('-','')+'-'+String(n).padStart(3,'0')};
        }
      }
      return {...i,status:newStatus,matched_tx_id:null,datev_number:null};
    })}));
  }

  // ── DATEV EXPORT ─────────────────────────────────────────────────
  function processFolderFiles(files, companyName){
    setProcessing(true);
    setProcessLog([]);
    let idx = 0;
    const newBelegeMap = JSON.parse(JSON.stringify(invoices));

    function next(){
      if(idx>=files.length){
        // Auto-match for all affected months
        const affected=[...new Set(Object.values(newBelegeMap).flat().map(b=>b.month).filter(Boolean))];
        const nb={...newBelegeMap};
        // run matching inline
        const allBankTx={...bankTx};
        const allCcTx={...ccTx};
        Object.keys(nb).forEach(m=>{
          const mb=(nb[m]||[]).slice();
          const allT=(allBankTx[m]||[]).concat(allCcTx[m]||[]);
          const used={};
          mb.forEach(b=>{if(b.status==='matched'||b.status==='manual')used[b.tx_id]=true;});
          mb.forEach((b,i)=>{
            if(b.status==='matched'||b.status==='manual') return;
            const amt=Math.abs(b.bruttobetrag||0);
            if(!amt){mb[i]={...b,status:'unmatched',candidates:[]};return;}
            const cands=[];
            allT.forEach(tx=>{
              if(used[tx.id]) return;
              const ta=Math.abs(tx.amount||0),diff=Math.abs(ta-amt);
              const as=diff<0.05?1:diff<1?0.75:diff<5?0.3:0;
              if(!as) return;
              const a2=(b.firma||'').toLowerCase().replace(/[^a-z0-9]/g,'');
              const b2=(tx.creditor||tx.desc||'').toLowerCase().replace(/[^a-z0-9]/g,'');
              const ns=(a2&&b2&&(a2===b2||b2.includes(a2.slice(0,4))||a2.includes(b2.slice(0,4))))?0.7:0;
              const sc=as*0.7+ns*0.3;
              if(sc>0.35) cands.push({tx,score:sc,as});
            });
            cands.sort((a,b)=>b.score-a.score);
            if(!cands.length){mb[i]={...b,status:'unmatched',candidates:[]};}
            else if(cands[0].score>=0.85&&cands[0].as===1){used[cands[0].tx.id]=true;mb[i]={...b,status:'matched',matched_tx_id:cands[0].tx.id,candidates:[]};}
            else{mb[i]={...b,status:'uncertain',candidates:cands.slice(0,3)};}
          });
          nb[m]=mb;
        });
        setInvoices(nb);
        setProcessing(false);
        return;
      }
      const f=files[idx]; idx++;
      setProcessLog(l=>[...l,'Lese: '+f.name+' ('+idx+'/'+files.length+')...']);

      // Fetch file from local server
      fetch('http://localhost:4001/file?path='+encodeURIComponent(f.path))
        .then(r=>r.json())
        .then(fd=>{
          if(!fd.base64) throw new Error('Datei nicht lesbar');
          return new Promise((res,rej)=>{
            if(fd.mime.startsWith('image/')){
              const img=new Image();
              img.onload=()=>{
                const max=800;let w=img.width,h=img.height;
                if(w>max||h>max){const r=Math.min(max/w,max/h);w=Math.round(w*r);h=Math.round(h*r);}
                const c=document.createElement('canvas');c.width=w;c.height=h;
                c.getContext('2d').drawImage(img,0,0,w,h);
                res({b64:c.toDataURL('image/jpeg',0.82).split(',')[1],mime:'image/jpeg',fd});
              };
              img.onerror=()=>res({b64:fd.base64,mime:fd.mime,fd});
              img.src='data:'+fd.mime+';base64,'+fd.base64;
            } else {
              res({b64:fd.base64,mime:fd.mime,fd});
            }
          });
        })
        .then(({b64,mime,fd})=>{
          return fetch('https://api.anthropic.com/v1/messages',{
            method:'POST',
            headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
            body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,messages:[{role:'user',content:[
              {type:mime.startsWith('image')?'image':'document',source:{type:'base64',media_type:mime,data:b64}},
              {type:'text',text:'Rechnung/Beleg als JSON (NUR JSON): {"firma":"","rechnungsnummer":"","rechnungsdatum":"YYYY-MM-DD","faelligkeitsdatum":null,"nettobetrag":0.00,"umsatzsteuer_prozent":0,"umsatzsteuer_betrag":0.00,"bruttobetrag":0.00,"waehrung":"EUR","leistungsbeschreibung":"","iban":null,"zahlungsreferenz":null,"kategorie":"IT/Miete/Personal/Marketing/Versicherung/Medien/Sonstiges"}'}
            ]}]})
          }).then(r=>r.json()).then(data=>{
            const txt=data.content?.map(c=>c.text||'').join('');
            const parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());
            // Determine month from date
            const dateStr=parsed.rechnungsdatum||'';
            let bMonth=month;
            if(dateStr){const p=dateStr.match(/(\d{4})-(\d{2})/);if(p) bMonth=p[1]+'-'+p[2];}
            // Global number
            const allNums=Object.values(newBelegeMap).flat().map(x=>x.global_nr||0);
            const globalNr=(allNums.length?Math.max(...allNums):0)+1+idx;
            const firma=(parsed.firma||'Unbekannt').replace(/[^a-zA-Z0-9]/g,'').slice(0,12);
            const year=(parsed.rechnungsdatum||bMonth).slice(0,4);
            const docName='JSR-'+year+'-'+String(globalNr).padStart(4,'0')+'_'+firma;
            const inv2={
              id:'inv_'+Date.now()+'_'+idx,
              filename:f.name,doc_name:docName,global_nr:globalNr,
              month:bMonth,status:'unmatched',matched_tx_id:null,datev_number:null,
              ...parsed,uploaded_at:new Date().toISOString(),_server:f,
            };
            if(!newBelegeMap[bMonth]) newBelegeMap[bMonth]=[];
            newBelegeMap[bMonth].push(inv2);
            // Save back to server
            fetch('http://localhost:4001/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({company:companyName,month:bMonth,doc_name:docName,source_path:f.path,source_hash:f.hash,source_key:f.key})}).catch(()=>{});
            setProcessLog(l=>[...l,'✓ '+parsed.firma+' | '+eur(parsed.bruttobetrag)+' → '+docName]);
          });
        })
        .catch(err=>setProcessLog(l=>[...l,'✗ '+f.name+': '+err.message]))
        .finally(()=>next());
    }
    next();
  }

  function buildDatevRows(matchedInv){
    return matchedInv.map(inv=>{
      const tx=(bankTx[month]||[]).find(t=>t.id===inv.matched_tx_id);
      const date=(inv.rechnungsdatum||tx?.date||'').replace(/-/g,'').slice(4);
      const amount=Math.abs(inv.bruttobetrag||0);
      const gegenkonto='4'+(
        inv.kategorie==='IT'?'900':
        inv.kategorie==='Miete'?'200':
        inv.kategorie==='Personal'?'120':
        inv.kategorie==='Marketing'?'600':
        inv.kategorie==='Versicherung'?'360':
        inv.kategorie==='Medien'?'680':'980');
      return {
        datev_number: inv.datev_number||'',
        firma: inv.firma||'',
        rechnungsnummer: inv.rechnungsnummer||'',
        datum: inv.rechnungsdatum||tx?.date||'',

        datev_date: date,
        amount_str: amount.toFixed(2).replace('.',','),
      };
    });
  }

        </select>
        <div style={{marginLeft:'auto',display:'flex',gap:8,alignItems:'center'}}>
          <span style={{fontSize:11,padding:'3px 10px',borderRadius:20,fontWeight:600,
            background:apiKey?'var(--green-bg)':'var(--red-bg)',
            color:apiKey?'var(--green)':'var(--red)'}}>
            {apiKey?'🔑 KI aktiv':'⚠ Kein API-Key'}
          </span>
          <button className="btn btn-sm" onClick={()=>setShowKeyInput(true)}>
            {apiKey?'Key ändern':'Key eingeben'}
          </button>
          {matched>0&&(
            <button className="btn btn-sm btn-primary" onClick={()=>setShowDatevPreview(true)}>
              📤 DATEV Vorschau ({matched})
            </button>
          )}
        </div>
      </div>

      {/* Layout with sidebar */}
      <div style={{display:'flex',gap:16,alignItems:'flex-start'}}>

      {/* Month Sidebar */}
      {showSidebar&&(
        <div style={{width:200,flexShrink:0}}>
          <div className="card" style={{padding:0,overflow:'hidden',position:'sticky',top:80}}>
            <div style={{padding:'10px 14px',fontSize:11,fontWeight:700,color:'var(--muted)',
              textTransform:'uppercase',letterSpacing:'.06em',borderBottom:'1px solid var(--border)'}}>
              Monate
            </div>
            <div style={{maxHeight:'calc(100vh - 200px)',overflowY:'auto'}}>
              {months.map(m=>{
                const mInv=invoices[m]||[];
                const mTx=bankTx[m]||[];
                const mDone=mInv.filter(i=>i.status==='matched').length;
                const mMissing=mInv.filter(i=>i.status==='missing').length;
                const hasBank=mTx.length>0;
                const hasInv=mInv.length>0;
                return(
                  <div key={m} onClick={()=>setMonth(m)}
                    style={{
                      padding:'10px 14px',cursor:'pointer',
                      borderLeft:month===m?'3px solid var(--blue)':'3px solid transparent',
                      background:month===m?'var(--blue-bg)':'transparent',
                      borderBottom:'1px solid var(--border)',
                    }}>
                    <div style={{fontSize:12,fontWeight:month===m?700:500,
                      color:month===m?'var(--blue)':'var(--text)'}}>
                      {fmtMonth(m)}
                    </div>
                    <div style={{display:'flex',gap:4,marginTop:4,flexWrap:'wrap'}}>
                      {hasBank&&<span style={{fontSize:9,padding:'1px 5px',borderRadius:20,
                        background:'var(--blue-bg)',color:'var(--blue)',fontWeight:600}}>
                        🏦 {mTx.length}
                      </span>}
                      {mDone>0&&<span style={{fontSize:9,padding:'1px 5px',borderRadius:20,
                        background:'var(--green-bg)',color:'var(--green)',fontWeight:600}}>
                        ✓ {mDone}
                      </span>}
                      {mMissing>0&&<span style={{fontSize:9,padding:'1px 5px',borderRadius:20,
                        background:'var(--red-bg)',color:'var(--red)',fontWeight:600}}>
                        ✗ {mMissing}
                      </span>}
                      {hasInv&&mDone===0&&mMissing===0&&<span style={{fontSize:9,padding:'1px 5px',borderRadius:20,
                        background:'var(--amber-bg,#fef3c7)',color:'var(--amber)',fontWeight:600}}>
                        ○ {mInv.length}
                      </span>}
                      {!hasBank&&!hasInv&&<span style={{fontSize:9,color:'var(--border)'}}>—</span>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* Main Content */}
      <div style={{flex:1,minWidth:0}}>

      {/* Upload Row */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
        <div className="card" style={{padding:'14px 16px'}}>
          <div style={{fontSize:12,fontWeight:700,marginBottom:8}}>🏦 Kontoauszug — CSV Upload</div>
          <div style={{fontSize:11,color:'var(--muted)',marginBottom:8}}>
            CSV vom Online-Banking. Spalten: Buchungstag, Betrag, Verwendungszweck, Empfänger.
          </div>
          <input type="file" accept=".csv,.txt" onChange={handleBankUpload}/>
          {monthTx.length>0&&(
            <div style={{marginTop:8,display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:11,color:'var(--green)',fontWeight:600}}>
                ✓ {monthTx.length} Buchungen · {monthTx.filter(t=>t.status==='salary').length} Löhne · {monthTx.filter(t=>t.status==='matched').length} zugeordnet
              </span>
              <button className="btn btn-sm" style={{color:'var(--red)',marginLeft:'auto'}}
                onClick={()=>{if(window.confirm('Kontoauszug für '+fmtMonth(month)+' löschen?')){
                  setBankTx(prev=>{const n={...prev};delete n[month];return n;});
                  setInvoices(prev=>({...prev,[month]:(prev[month]||[]).map(i=>({...i,matched_tx_id:null,datev_number:i.matched_tx_id?null:i.datev_number,status:i.status==='matched'?'unmatched':i.status}))}));
                }}}>
                🗑 Kontoauszug löschen
              </button>
            </div>
          )}
        </div>
        <div className="card" style={{padding:'14px 16px'}}>
          <div style={{fontSize:12,fontWeight:700,marginBottom:8}}>🧾 Rechnungen — PDF / Bild Upload</div>
          <div style={{fontSize:11,color:'var(--muted)',marginBottom:8}}>
            KI liest automatisch aus: Firma, Nr., Betrag, USt, Leistung. Mehrere Dateien gleichzeitig möglich.
          </div>
          <input type="file" accept=".pdf,.png,.jpg,.jpeg,.webp" multiple
            onChange={handleInvoiceUpload} disabled={processing||!apiKey}/>
          {processing&&<div style={{marginTop:8,fontSize:11,color:'var(--blue)',fontWeight:600}}>⏳ KI liest Rechnungen...</div>}
          {!apiKey&&<div style={{marginTop:8,fontSize:11,color:'var(--red)'}}>⚠ Zuerst API-Key eingeben</div>}
          <div style={{marginTop:12,borderTop:'1px solid var(--border)',paddingTop:12}}>
            <div style={{fontSize:12,fontWeight:700,marginBottom:6}}>📁 Ordner-Scan (lokaler Server)</div>
            <div style={{fontSize:11,color:'var(--muted)',marginBottom:8}}>
              Belege aus ~/Downloads/JSR-Belege/[Firma]/Eingang/ automatisch einlesen.
              Server muss laufen: <code style={{fontFamily:'var(--mono)',background:'var(--surface-2)',padding:'1px 4px',borderRadius:4}}>python3 beleg_server.py</code>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-primary" style={{flex:1}}
                onClick={()=>{
                  const co=(COMPANIES||[{id:'parklane1',name:'Parklane GmbH'},{id:'parklane2',name:'Parklane Zwei GmbH'},{id:'parklane3',name:'Parklane Drei GmbH'},{id:'parklane4',name:'Parklane Vier GmbH'}]).find(c=>c.id===company);
                  if(!co){alert('Bitte zuerst Firma waehlen');return;}
                  if(!apiKey){setShowKeyInput(true);return;}
                  const xhr=new XMLHttpRequest();
                  xhr.open('GET','http://localhost:4001/scan?company='+encodeURIComponent(co.name));
                  xhr.timeout=3000;
                  xhr.onload=function(){
                    try{
                      const d=JSON.parse(xhr.responseText);
                      if(!d.files||!d.files.length){alert('Keine neuen Dateien in:\n~/Downloads/JSR-Belege/'+co.name+'/Eingang/');return;}
                      processFolderFiles(d.files,co.name);
                    }catch(e){alert('Fehler: '+e.message);}
                  };
                  xhr.onerror=function(){alert('Server nicht erreichbar.\nBitte starten:\n\npython3 beleg_server.py');};
                  xhr.ontimeout=function(){alert('Server Timeout.\nLaeuft beleg_server.py?');};
                  xhr.send();
                }}>
                📂 Eingang scannen
              </button>
              <button className="btn btn-sm" style={{flexShrink:0,background:'var(--amber-bg)',color:'var(--amber)',border:'1px solid rgba(217,119,6,.3)',fontWeight:700}}
                title="Alle Dateien erneut einlesen (History zuruecksetzen)"
                onClick={()=>{
                  const co=(COMPANIES||[{id:'parklane1',name:'Parklane GmbH'},{id:'parklane2',name:'Parklane Zwei GmbH'},{id:'parklane3',name:'Parklane Drei GmbH'},{id:'parklane4',name:'Parklane Vier GmbH'}]).find(c=>c.id===company);
                  if(!co) return;
                  if(!apiKey){setShowKeyInput(true);return;}
                  if(!window.confirm('History zuruecksetzen und alle Dateien im Eingang-Ordner erneut einlesen?')) return;
                  // Reset processed history on server
                  fetch('http://localhost:4001/reset?company='+encodeURIComponent(co.name),{method:'POST'})
                    .then(r=>r.json())
                    .then(()=>{
                      // Now scan again
                      return fetch('http://localhost:4001/scan?company='+encodeURIComponent(co.name));
                    })
                    .then(r=>r.json())
                    .then(d=>{
                      if(!d.files||!d.files.length){alert('Keine Dateien im Eingang-Ordner gefunden.');return;}
                      processFolderFiles(d.files,co.name);
                    })
                    .catch(()=>alert('Server nicht erreichbar.\nBitte starten:\n\npython3 beleg_server.py'));
                }}>
                🔄 Neu
              </button>
            </div>
            <div style={{fontSize:10,fontFamily:'var(--mono)',color:'var(--muted)',textAlign:'center',marginTop:6}}>
              {(COMPANIES||[{id:'parklane1',name:'Parklane GmbH'},{id:'parklane2',name:'Parklane Zwei GmbH'},{id:'parklane3',name:'Parklane Drei GmbH'},{id:'parklane4',name:'Parklane Vier GmbH'}]).find(c=>c.id===company)?.name||'Firma'} / Eingang
            </div>
          </div>

        </div>
      </div>

      {/* Process Log */}
      {processLog.filter(Boolean).length>0&&(
        <div className="card" style={{padding:'10px 14px',marginBottom:12}}>
          {processLog.filter(Boolean).map((l,i)=>(
            <div key={i} style={{fontSize:11,fontFamily:'var(--mono)',marginBottom:2,
              color:l.startsWith('✓')?'var(--green)':l.startsWith('✗')?'var(--red)':'var(--blue)'}}>
              {l}
            </div>
          ))}
        </div>
      )}

      {/* Re-run matching button - shown when bank tx exists but unmatched invoices */}
      {monthTx.length>0&&monthInv.filter(i=>i.status==='unmatched').length>0&&(
        <div style={{marginBottom:12,padding:'10px 14px',background:'var(--blue-bg)',borderRadius:'var(--r-md)',
          border:'1px solid rgba(29,78,216,.2)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{fontSize:12,color:'var(--blue)'}}>
            <strong>{monthInv.filter(i=>i.status==='unmatched').length} Belege</strong> ohne Zuordnung — Kontoauszug ist vorhanden.
          </div>
          <button className="btn btn-primary btn-sm" onClick={()=>{
            const invList=[...monthInv];
            const txList=[...monthTx];
            const used={};
            invList.forEach(i=>{if(i.status==='matched')used[i.matched_tx_id]=true;});
            invList.forEach((inv2,i)=>{
              if(inv2.status==='matched'||inv2.status==='manual') return;
              const amount=Math.abs(inv2.bruttobetrag||0);
              if(!amount) return;
              const tx=txList.find(t=>{
                if(used[t.id]) return false;
                const diff=Math.abs(Math.abs(t.amount)-amount);
                if(diff>5) return false;
                const as=diff<0.05?1:diff<1?0.75:0.3;
                const a2=(inv2.firma||'').toLowerCase().replace(/[^a-z0-9]/g,'');
                const b2=(t.creditor||t.desc||'').toLowerCase().replace(/[^a-z0-9]/g,'');
                const ns=(a2&&b2&&(a2===b2||b2.includes(a2.slice(0,4))||a2.includes(b2.slice(0,4))))?0.7:0;
                return (as*0.7+ns*0.3)>=0.5;
              });
              if(tx){
                const n=invList.filter(x=>x.status==='matched').length+1;
                const dn='RE-'+month.replace('-','')+'-'+String(n).padStart(3,'0');
                invList[i]={...inv2,status:'matched',matched_tx_id:tx.id,datev_number:dn};
                used[tx.id]=true;
              }
            });
            setInvoices(prev=>({...prev,[month]:invList}));
          }}>
            🔄 Jetzt zuordnen
          </button>
        </div>
      )}

      {/* KPI */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:8,marginBottom:16}}>
        {[
          {label:'Rechnungen gesamt',val:monthInv.length,color:'var(--text)'},
          {label:'✓ Zugeordnet / Done',val:matched,color:'var(--green)'},
          {label:'○ Kein Match',val:unmatched,color:'var(--amber)'},
          {label:'✗ Missing',val:missing,color:missing>0?'var(--red)':'var(--muted)'},
          {label:'💼 Löhne im Konto',val:monthTx.filter(t=>t.status==='salary').length,color:'var(--purple)'},
          {label:'Gesamtbetrag',val:eur(totalBrutto),color:'var(--blue)'},
        ].map((k,i)=>(
          <div key={i} className="card" style={{padding:'10px 12px',textAlign:'center'}}>
            <div style={{fontSize:i===4?14:22,fontWeight:700,color:k.color,fontFamily:'var(--mono)'}}>{k.val}</div>
            <div style={{fontSize:10,color:'var(--muted)',marginTop:3}}>{k.label}</div>
          </div>
        ))}
      </div>

      {/* MAIN TABLE */}
      <div className="card">
        <div className="card-header">
          <span className="card-title">📋 Rechnungsübersicht — {fmtMonth(month)}</span>
          <span style={{fontSize:11,color:'var(--muted)'}}>{monthInv.length} Einträge</span>
        </div>
        {monthInv.length===0?(
          <div style={{padding:40,textAlign:'center',color:'var(--muted)'}}>
            <div style={{fontSize:32,marginBottom:8}}>🧾</div>
            <div style={{fontWeight:600,marginBottom:4}}>Noch keine Rechnungen für {fmtMonth(month)}</div>
            <div style={{fontSize:12}}>PDFs oder Bilder oben hochladen — KI liest alles automatisch aus.</div>
          </div>
        ):(
          <div style={{overflowX:'auto'}}>
            <table>
              <thead>
                <tr>
                  <th>Status</th>
                  <th>DATEV-Nr.</th>
                  <th>Firma</th>
                  <th>Rechnung-Nr.</th>
                  <th>Datum</th>
                  <th>Fälligkeit</th>
                  <th>Leistung</th>
                  <th>Netto</th>
                  <th>USt %</th>
                  <th>Brutto</th>
                  <th>Kategorie</th>
                  <th>Bankbuchung</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                {monthInv.map(inv=>{
                  const tx=(bankTx[month]||[]).find(t=>t.id===inv.matched_tx_id);
                  const isDone=inv.status==='matched';
                  const isMissing=inv.status==='missing';
                  return(
                    <tr key={inv.id} style={{background:isDone?'rgba(16,185,129,.04)':isMissing?'rgba(239,68,68,.04)':''}}>
                      <td>
                        <span style={{fontSize:11,padding:'2px 8px',borderRadius:20,fontWeight:700,whiteSpace:'nowrap',
                          background:isDone?'var(--green-bg)':isMissing?'var(--red-bg)':'var(--amber-bg,#fef3c7)',
                          color:isDone?'var(--green)':isMissing?'var(--red)':'var(--amber)'}}>
                          {isDone?'✓ Done':isMissing?'✗ Missing':'○ Offen'}
                        </span>
                      </td>
                      <td style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--blue)',fontWeight:700}}>
                        {inv.datev_number||'—'}
                      </td>
                      <td>
                        <div style={{fontWeight:600,fontSize:12}}>{inv.firma||inv.filename}</div>
                        {inv.doc_name&&<div style={{fontSize:9,fontFamily:'var(--mono)',color:'var(--blue)',marginTop:1}}>{inv.doc_name}</div>}
                      </td>
                      <td style={{fontFamily:'var(--mono)',fontSize:11}}>{inv.rechnungsnummer||'—'}</td>
                      <td style={{fontFamily:'var(--mono)',fontSize:11,whiteSpace:'nowrap'}}>{inv.rechnungsdatum||'—'}</td>
                      <td style={{fontFamily:'var(--mono)',fontSize:11,whiteSpace:'nowrap',
                        color:inv.faelligkeitsdatum&&new Date(inv.faelligkeitsdatum)<new Date()?'var(--red)':'inherit'}}>
                        {inv.faelligkeitsdatum||'—'}
                      </td>
                      <td style={{fontSize:11,color:'var(--muted)',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                        {inv.leistungsbeschreibung||'—'}
                      </td>
                      <td style={{fontFamily:'var(--mono)',fontSize:12,textAlign:'right'}}>{inv.nettobetrag?eur(inv.nettobetrag):'—'}</td>
                      <td style={{fontFamily:'var(--mono)',fontSize:12,textAlign:'right'}}>{inv.umsatzsteuer_prozent!=null?inv.umsatzsteuer_prozent+'%':'—'}</td>
                      <td style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:700,textAlign:'right'}}>{eur(inv.bruttobetrag)}</td>
                      <td>
                        <span style={{fontSize:10,padding:'1px 6px',borderRadius:20,
                          background:'var(--surface-2)',color:'var(--muted)'}}>
                          {inv.kategorie||'—'}
                        </span>
                      </td>
                      <td style={{fontSize:11,color:tx?'var(--green)':'var(--muted)',whiteSpace:'nowrap',maxWidth:140,overflow:'hidden',textOverflow:'ellipsis'}}>
                        {tx?(tx.date+' · '+eur(Math.abs(tx.amount))):'—'}
                      </td>
                      <td>
                        <div style={{display:'flex',gap:4}}>
                          {!isDone&&!isMissing&&(
                            <button className="btn btn-sm" style={{fontSize:10,color:'var(--green)'}}
                              onClick={()=>toggleStatus(inv.id,'matched')} title="Als Done markieren">✓</button>
                          )}
                          {!isMissing&&!isDone&&(
                            <button className="btn btn-sm" style={{fontSize:10,color:'var(--red)'}}
                              onClick={()=>toggleStatus(inv.id,'missing')} title="Als Missing markieren">✗</button>
                          )}
                          {(isMissing||isDone)&&(
                            <button className="btn btn-sm" style={{fontSize:10,color:'var(--muted)'}}
                              onClick={()=>toggleStatus(inv.id,'unmatched')} title="Zurücksetzen">↩</button>
                          )}
                          <button className="btn btn-sm" style={{fontSize:10,color:'var(--red)'}}
                            onClick={()=>deleteInvoice(inv.id)} title="Löschen">×</button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
              {/* Totals row */}
              {monthInv.length>0&&(
                <tfoot>
                  <tr style={{background:'var(--surface-2)',fontWeight:700}}>
                    <td colSpan={7} style={{fontSize:12,padding:'8px 12px'}}>
                      Gesamt · {matched} von {monthInv.length} zugeordnet
                    </td>
                    <td style={{fontFamily:'var(--mono)',fontSize:12,textAlign:'right'}}>
                      {eur(monthInv.reduce((s,i)=>s+(i.nettobetrag||0),0))}
                    </td>
                    <td></td>
                    <td style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:800,textAlign:'right',color:'var(--blue)'}}>
                      {eur(monthInv.reduce((s,i)=>s+Math.abs(i.bruttobetrag||0),0))}
                    </td>
                    <td colSpan={3}></td>
                  </tr>
                </tfoot>
              )}
            </table>
          </div>
        )}
      </div>

      {/* Bank transactions for unmatched */}
      {(monthTx.filter(t=>t.status==='open'&&t.amount<0).length>0||monthTx.filter(t=>t.status==='salary').length>0)&&(
        <div className="card" style={{marginTop:12}}>
          <div className="card-header">
            <span className="card-title">🏦 Offene Bankbuchungen (Ausgaben ohne Rechnung)</span>
            <span style={{fontSize:11,color:'var(--muted)'}}>
              {monthTx.filter(t=>t.status==='open'&&t.amount<0).length} offen ·&nbsp;
              <span style={{color:'var(--purple)',fontWeight:600}}>{monthTx.filter(t=>t.status==='salary').length} Löhne/Gehälter</span>
            </span>
          </div>
          <table>
            <thead><tr><th>Datum</th><th>Empfänger / Verwendungszweck</th><th>Betrag</th><th></th></tr></thead>
            <tbody>
              {[...monthTx.filter(t=>t.status==='salary'), ...monthTx.filter(t=>t.status==='open'&&t.amount<0)].map(tx=>(
                <tr key={tx.id} style={{background:tx.status==='salary'?'rgba(124,58,237,.06)':''}}>
                  <td style={{fontFamily:'var(--mono)',fontSize:11,whiteSpace:'nowrap'}}>{tx.date}</td>
                  <td style={{fontSize:12}}>
                    {tx.status==='salary'&&<span style={{fontSize:10,padding:'1px 6px',borderRadius:20,background:'#f5f3ff',color:'#7c3aed',fontWeight:700,marginRight:6}}>💼 Lohn/Gehalt</span>}
                    {tx.creditor&&<strong style={{marginRight:6}}>{tx.creditor}</strong>}
                    <span style={{color:'var(--muted)'}}>{tx.desc.slice(0,60)}</span>
                  </td>
                  <td style={{fontFamily:'var(--mono)',fontWeight:700,color:tx.status==='salary'?'#7c3aed':'var(--red)',textAlign:'right'}}>
                    {eur(Math.abs(tx.amount))}
                  </td>
                  <td>
                    <button className="btn btn-sm" style={{fontSize:10,color:'var(--red)'}}
                      onClick={()=>setBankTx(prev=>({...prev,[month]:(prev[month]||[]).filter(t=>t.id!==tx.id)}))}
                      title="Buchung löschen">×</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
      </div>{/* end main content */}
      </div>{/* end sidebar layout */}
    </div>
  );
}
function App(){
  return(
    <div style={{minHeight:'100vh',background:'var(--bg,#f8fafc)'}}>
      <div className="bk-header">
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <a href="index.html" style={{color:'rgba(255,255,255,.6)',textDecoration:'none',fontSize:20}}>←</a>
          <div style={{width:32,height:32,background:'rgba(255,255,255,.2)',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🧾</div>
          <div>
            <div style={{fontSize:16,fontWeight:700,color:'white'}}>Buchhaltung</div>
            <div style={{fontSize:11,color:'rgba(255,255,255,.6)'}}>Rechnungen · Kontoauszug · DATEV</div>
          </div>
        </div>
        <div style={{fontSize:11,color:'rgba(255,255,255,.5)'}}>JSR BPO Intelligence Platform</div>
      </div>
      <div className="bk-content"><InvoiceView/></div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
