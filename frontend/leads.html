<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d0f14;
    --surface:  #13161d;
    --card:     #191d26;
    --border:   #252a36;
    --border2:  #2f3546;
    --text:     #e8eaf0;
    --muted:    #6b7280;
    --dim:      #9aa0b0;

    --blue:     #3b82f6;
    --blue-bg:  rgba(59,130,246,.12);
    --green:    #22c55e;
    --green-bg: rgba(34,197,94,.12);
    --amber:    #f59e0b;
    --amber-bg: rgba(245,158,11,.12);
    --red:      #ef4444;
    --red-bg:   rgba(239,68,68,.12);
    --purple:   #a78bfa;
    --purple-bg:rgba(167,139,250,.12);
    --teal:     #2dd4bf;
    --teal-bg:  rgba(45,212,191,.12);

    --font-mono: 'DM Mono', monospace;
    --font-body: 'DM Sans', sans-serif;
    --r: 6px;
    --r-lg: 10px;
  }

  html { font-family: var(--font-body); background: var(--bg); color: var(--text); font-size: 14px; }
  body { min-height: 100vh; }

  /* Layout */
  .landing { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; background: var(--bg); }
  .landing-logo-mark { font-size: 11px; font-weight: 600; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); font-family: var(--font-mono); margin-bottom: 4px; }
  .landing-logo-name { font-size: 28px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
  .landing-sub { font-size: 14px; color: var(--muted); margin-bottom: 48px; }
  .tile-grid { display: grid; grid-template-columns: repeat(3, 260px); gap: 16px; }
  .tile { background: var(--card); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 28px 24px; cursor: pointer; transition: all .2s; position: relative; overflow: hidden; }
  .tile:hover:not(.tile-disabled) { border-color: var(--blue); transform: translateY(-2px); }
  .tile-disabled:hover { transform: none !important; border-color: var(--border) !important; opacity: .45 !important; cursor: not-allowed !important; }
  .tile-disabled { pointer-events: none; }
  .tile-disabled { opacity: .45; cursor: not-allowed; }
  .tile-icon { font-size: 28px; margin-bottom: 16px; }
  .tile-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .tile-desc { font-size: 12px; color: var(--muted); line-height: 1.6; }
  .tile-badge { position: absolute; top: 12px; right: 12px; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; letter-spacing: .05em; }
  .tile-badge-active { background: var(--green-bg); color: var(--green); border: 1px solid rgba(34,197,94,.3); }
  .tile-badge-soon { background: rgba(107,114,128,.12); color: var(--muted); }
  .tile-active { border-color: rgba(59,130,246,.4); }
  .tile-active:hover { box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
  .layout { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 240px; min-width: 240px; background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }
  .main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

  /* Sidebar */
  .sidebar-logo { padding: 20px 16px 16px; border-bottom: 1px solid var(--border); }
  .logo-mark { font-size: 11px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); font-family: var(--font-mono); }
  .logo-name { font-size: 17px; font-weight: 600; color: var(--text); margin-top: 2px; }

  .nav-section { padding: 20px 12px 8px; }
  .nav-label { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); padding: 0 8px; margin-bottom: 6px; }
  .nav-item { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: var(--r); cursor: pointer; font-size: 13px; font-weight: 400; color: var(--dim); transition: all .15s; }
  .nav-item:hover { background: var(--card); color: var(--text); }
  .nav-item.active { background: var(--blue-bg); color: var(--blue); }
  .nav-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  /* Filter sidebar section */
  .filter-section { flex: 1; padding: 16px 12px; border-top: 1px solid var(--border); overflow-y: auto; }
  .filter-group { margin-bottom: 20px; }
  .filter-group-label { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; padding: 0 4px; }
  .filter-chip-wrap { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; border: 1px solid var(--border); cursor: pointer; transition: all .15s; background: transparent; color: var(--dim); font-family: var(--font-body); }
  .chip:hover { border-color: var(--border2); color: var(--text); }
  .chip.on { background: var(--blue-bg); border-color: rgba(59,130,246,.35); color: var(--blue); }

  /* Topbar */
  .topbar { display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .search-wrap { position: relative; flex: 1; max-width: 360px; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  .search-input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 7px 12px 7px 34px; color: var(--text); font-family: var(--font-body); font-size: 13px; outline: none; transition: border .15s; }
  .search-input:focus { border-color: var(--blue); }
  .search-input::placeholder { color: var(--muted); }

  .topbar-stats { display: flex; gap: 16px; margin-left: auto; }
  .stat-pill { font-size: 11px; font-family: var(--font-mono); color: var(--muted); }
  .stat-pill strong { color: var(--text); font-weight: 500; }

  .btn { padding: 6px 14px; border-radius: var(--r); font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; font-family: var(--font-body); border: 1px solid var(--border); background: var(--card); color: var(--dim); }
  .btn:hover { color: var(--text); border-color: var(--border2); }
  .btn-primary { background: var(--blue); border-color: var(--blue); color: #fff; }
  .btn-primary:hover { filter: brightness(1.1); }

  /* Table */
  .table-wrap { flex: 1; overflow: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead th { position: sticky; top: 0; background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--muted); white-space: nowrap; cursor: pointer; user-select: none; z-index: 10; }
  thead th:hover { color: var(--dim); }
  thead th.sorted { color: var(--blue); }
  tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
  tbody tr:hover { background: var(--card); }
  tbody tr.selected { background: rgba(59,130,246,.06); }
  td { padding: 9px 12px; vertical-align: middle; }

  /* Badges */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; white-space: nowrap; }
  .badge-cat-airline { background: var(--blue-bg); color: var(--blue); }
  .badge-cat-kreuzfahrt { background: var(--teal-bg); color: var(--teal); }
  .badge-cat-veranstalter { background: var(--purple-bg); color: var(--purple); }
  .badge-cat-pauschalreise { background: var(--purple-bg); color: var(--purple); }
  .badge-cat-ota { background: var(--amber-bg); color: var(--amber); }
  .badge-cat-vermittler { background: var(--amber-bg); color: var(--amber); }
  .badge-cat-hotelkette { background: rgba(244,63,94,.12); color: #fb7185; }
  .badge-cat-boutique_hotel { background: rgba(244,63,94,.12); color: #fb7185; }
  .badge-cat-mietwagen { background: var(--green-bg); color: var(--green); }
  .badge-cat-dmc { background: rgba(99,102,241,.12); color: #818cf8; }
  .badge-cat-tech_provider { background: rgba(16,185,129,.12); color: #34d399; }
  .badge-cat-default { background: rgba(107,114,128,.12); color: var(--muted); }

  .prio-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
  .prio-vip    { background: #f59e0b; box-shadow: 0 0 6px rgba(245,158,11,.5); }
  .prio-high   { background: var(--red); }
  .prio-medium { background: var(--blue); }
  .prio-low    { background: var(--muted); }

  .status-badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
  .s-neu             { background: rgba(107,114,128,.15); color: var(--dim); }
  .s-in_bearbeitung  { background: rgba(59,130,246,.15); color: #60a5fa; }
  .s-kontaktiert     { background: rgba(245,158,11,.15); color: var(--amber); }
  .s-qualifiziert    { background: rgba(167,139,250,.15); color: var(--purple); }
  .s-angebot         { background: rgba(34,197,94,.15); color: var(--green); }
  .s-gewonnen        { background: rgba(34,197,94,.25); color: #4ade80; border: 1px solid rgba(34,197,94,.3); }
  .s-verloren        { background: var(--red-bg); color: #f87171; }

  .score-bar { display: flex; align-items: center; gap: 6px; }
  .score-track { width: 52px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 2px; transition: width .3s; }
  .score-num { font-family: var(--font-mono); font-size: 11px; min-width: 24px; color: var(--dim); }

  .job-signal { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 2px 7px; border-radius: 4px; background: var(--green-bg); color: var(--green); font-weight: 500; }
  .job-signal.none { color: var(--muted); background: transparent; font-weight: 400; }

  .country-flag { font-size: 14px; }
  .company-name { font-weight: 500; color: var(--text); font-size: 13px; }
  .company-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .revenue { font-family: var(--font-mono); font-size: 11px; color: var(--dim); }

  /* Detail Panel */
  .detail-panel { width: 420px; min-width: 420px; background: var(--surface); border-left: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }

  .detail-header { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); }
  .detail-close { float: right; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; line-height: 1; }
  .detail-close:hover { color: var(--text); }
  .detail-company { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
  .detail-meta { display: flex; gap: 8px; flex-wrap: wrap; }
  .detail-body { padding: 16px 20px; flex: 1; }
  .detail-section { margin-bottom: 20px; }
  .detail-section-title { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .detail-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 6px 0; border-bottom: 1px solid var(--border); gap: 12px; }
  .detail-row:last-child { border-bottom: none; }
  .detail-key { font-size: 12px; color: var(--muted); flex-shrink: 0; }
  .detail-val { font-size: 12px; color: var(--text); text-align: right; word-break: break-all; }
  .detail-val a { color: var(--blue); text-decoration: none; }
  .detail-val a:hover { text-decoration: underline; }

  .contact-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 10px 12px; margin-bottom: 8px; }
  .contact-name { font-weight: 500; font-size: 13px; }
  .contact-role { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .contact-links { display: flex; gap: 8px; margin-top: 6px; }
  .contact-link { font-size: 11px; color: var(--blue); text-decoration: none; }
  .contact-link:hover { text-decoration: underline; }
  .dm-badge { font-size: 9px; font-weight: 700; letter-spacing: .06em; padding: 1px 5px; background: var(--amber-bg); color: var(--amber); border-radius: 3px; vertical-align: middle; margin-left: 4px; }

  .job-item { display: flex; flex-direction: column; gap: 3px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .job-item:last-child { border-bottom: none; }
  .job-title { font-size: 12px; font-weight: 500; color: var(--text); }
  .job-meta { display: flex; gap: 8px; font-size: 11px; color: var(--muted); }

  .activity-item { padding: 8px 0; border-bottom: 1px solid var(--border); }
  .activity-item:last-child { border-bottom: none; }
  .activity-type { font-size: 11px; font-weight: 500; color: var(--dim); }
  .activity-note { font-size: 12px; color: var(--text); margin-top: 2px; }
  .activity-time { font-size: 10px; color: var(--muted); margin-top: 2px; font-family: var(--font-mono); }

  .quick-status { display: flex; flex-wrap: wrap; gap: 5px; }
  .q-btn { padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--dim); font-family: var(--font-body); transition: all .15s; }
  .q-btn:hover { background: var(--card); color: var(--text); }
  .q-btn.active { background: var(--blue-bg); border-color: rgba(59,130,246,.4); color: var(--blue); }

  /* Pagination */
  .pagination { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .page-info { font-size: 12px; color: var(--muted); font-family: var(--font-mono); }
  .page-btns { display: flex; gap: 4px; }
  .page-btn { padding: 4px 10px; border-radius: var(--r); border: 1px solid var(--border); background: transparent; color: var(--dim); font-size: 12px; cursor: pointer; font-family: var(--font-mono); transition: all .15s; }
  .page-btn:hover:not(:disabled) { background: var(--card); color: var(--text); }
  .page-btn:disabled { opacity: .35; cursor: default; }
  .page-btn.current { background: var(--blue-bg); border-color: rgba(59,130,246,.4); color: var(--blue); }

  /* Loading */
  .loading-row td { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>

// ─── Helpers ──────────────────────────────────────────────
const CAT_LABELS = {
  airline:'Airline', kreuzfahrt:'Kreuzfahrt', veranstalter:'Veranstalter',
  pauschalreise:'Pauschalreise', ota:'OTA', vermittler:'Vermittler',
  hotelkette:'Hotelkette', boutique_hotel:'Boutique Hotel', mietwagen:'Mietwagen',
  dmc:'DMC', incoming:'Incoming', transfer:'Transfer', bahn:'Bahn',
  bus_coach:'Bus & Coach', activity_provider:'Activities', tech_provider:'Travel Tech',
  versicherung:'Versicherung', sonstiges:'Sonstiges',
};
const STATUS_LABELS = {
  neu:'Neu', in_bearbeitung:'In Bearb.', kontaktiert:'Kontaktiert',
  qualifiziert:'Qualifiziert', angebot:'Angebot', gewonnen:'Gewonnen',
  verloren:'Verloren', do_not_contact:'DNC',
};
const COUNTRY_FLAGS = { DE:'🇩🇪', AT:'🇦🇹', CH:'🇨🇭' };

function fmtRevenue(val) {
  if (!val) return '—';
  if (val >= 1e9) return `${(val/1e9).toFixed(1)} Mrd €`;
  if (val >= 1e6) return `${(val/1e6).toFixed(0)} Mio €`;
  return `${(val/1e3).toFixed(0)}T €`;
}
function fmtDate(str) {
  if (!str) return '';
  return new Date(str).toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'2-digit' });
}
function scoreColor(s) {
  if (s >= 80) return '#22c55e';
  if (s >= 60) return '#3b82f6';
  if (s >= 40) return '#f59e0b';
  return '#6b7280';
}

// ─── Components ───────────────────────────────────────────

function PrioDot({ prio }) {
  return <span className={`prio-dot prio-${prio}`} title={prio} />;
}

function CatBadge({ cat }) {
  const cls = `badge badge-cat-${cat} badge-cat-default`;
  return <span className={`badge badge-cat-${cat}`}>{CAT_LABELS[cat] || cat}</span>;
}

function StatusBadge({ status }) {
  return <span className={`status-badge s-${status}`}>{STATUS_LABELS[status] || status}</span>;
}

function ScoreBar({ score }) {
  return (
    <div className="score-bar">
      <div className="score-track">
        <div className="score-fill" style={{ width:`${score}%`, background:scoreColor(score) }} />
      </div>
      <span className="score-num">{score}</span>
    </div>
  );
}

function JobSignal({ count, has }) {
  if (!has) return <span className="job-signal none">—</span>;
  return <span className="job-signal">▲ {count}</span>;
}

// ─── Detail Panel ─────────────────────────────────────────
function DetailPanel({ company, onClose, onStatusChange }) {

  const [jobs, setJobs] = React.useState([]);
  const [page, setPage] = React.useState(1);

    fetch(`http://localhost:8000/api/v1/contacts/company/${company.id}`)
      .then(r => { if(!r.ok) throw new Error(r.status); return r.json(); })
      .then(data => setContacts(Array.isArray(data) ? data : []))
      .catch(e => { console.warn('Kontakte Fehler:', e); setContacts([]); });
    // Echte Jobs laden
    fetch(`http://localhost:8000/api/v1/jobs/company/${company.id}`)
      .then(r => { if(!r.ok) throw new Error(r.status); return r.json(); })
      .then(data => setJobs(Array.isArray(data) ? data : []))
      .catch(e => { console.warn('Jobs Fehler:', e); setJobs([]); });
  }, [company.id]);
  const statuses = ['neu','in_bearbeitung','kontaktiert','qualifiziert','angebot','gewonnen','verloren'];

  return (
    <div className="detail-panel">
      <div className="detail-header">

        <div className="detail-company">{company.name}</div>

            {COUNTRY_FLAGS[company.country]} {company.country}
          </span>
          <StatusBadge status={company.status} />
        </div>
      </div>

      <div className="detail-body">
        {/* Quick Status */}
        <div className="detail-section">
          <div className="detail-section-title">Status ändern</div>
          <div className="quick-status">
            {statuses.map(s => (
              <button
                key={s}
                className={`q-btn ${company.status === s ? 'active' : ''}`}
                onClick={() => onStatusChange(company.id, s)}
              >
                {STATUS_LABELS[s]}
              </button>
            ))}
          </div>
        </div>

        {/* Kontakt */}
        <div className="detail-section">
          <div className="detail-section-title">Kontaktdaten</div>
          <div className="detail-row"><span className="detail-key">Website</span>

          <div className="detail-row"><span className="detail-key">E-Mail</span>

          <div className="detail-row"><span className="detail-key">Telefon</span>
            <span className="detail-val">{company.phone_main || '—'}</span></div>
          <div className="detail-row"><span className="detail-key">Stadt</span>
            <span className="detail-val">{company.city || '—'}</span></div>
        </div>

        {/* Kennzahlen */}
        <div className="detail-section">
          <div className="detail-section-title">Kennzahlen</div>
          <div className="detail-row"><span className="detail-key">Umsatz ca.</span>
            <span className="detail-val">{fmtRevenue(company.revenue_approx_eur)}</span></div>
          <div className="detail-row"><span className="detail-key">Mitarbeiter</span>
            <span className="detail-val">{company.employees_approx ? company.employees_approx.toLocaleString('de-DE') : '—'}</span></div>
          <div className="detail-row"><span className="detail-key">Größe</span>
            <span className="detail-val">{company.size || '—'}</span></div>
          <div className="detail-row"><span className="detail-key">Score</span>
            <span className="detail-val"><ScoreBar score={company.score} /></span></div>
        </div>

        {/* Ansprechpartner */}
        <div className="detail-section">
          <div className="detail-section-title">
            Ansprechpartner ({contacts.length})
          </div>
          {contacts.length === 0 && <div style={{color:'var(--muted)',fontSize:12}}>Noch keine Kontakte — People Enrichment starten</div>}
          {contacts.length === 0 && <div style={{color:'var(--muted)',fontSize:12,padding:'8px 0'}}>Keine Ansprechpartner gefunden</div>}
          {contacts.map(c => (
            <div className="contact-card" key={c.id} style={{cursor:'default'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>

                  {c.first_name ? `${c.first_name} ${c.last_name}` : c.last_name}

                      style={{fontSize:11,padding:'2px 7px',borderRadius:4,background:'var(--blue-bg)',color:'var(--blue)',textDecoration:'none',border:'1px solid rgba(59,130,246,.3)'}}>
                      ✉ Mail
                    </a>
                  )}
                  {c.phone_direct && (
                    <a href={`tel:${c.phone_direct}`} title={c.phone_direct}
                      style={{fontSize:11,padding:'2px 7px',borderRadius:4,background:'var(--green-bg)',color:'var(--green)',textDecoration:'none',border:'1px solid rgba(34,197,94,.3)'}}>
                      📞 Tel

                    <a href={c.linkedin_url} target="_blank" rel="noopener"

              </div>

              {!c.email && !c.phone_direct && !c.linkedin_url && (
                <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>

        {/* Job Signals */}
        {jobs.length > 0 && (
          <div className="detail-section">

                  {j.is_growth_signal && <span style={{color:'var(--green)',marginRight:5}}>▲</span>}
                  <a href={j.external_url} target="_blank" style={{color:'var(--text)',textDecoration:'none'}}>{j.title}</a>

                <div className="job-meta">
                  <span>{j.platform}</span>
                  {j.location && <span>{j.location}</span>}
                  {j.platform_posted_at && <span>{j.platform_posted_at}</span>}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState('landing');
  const [view, setView] = useState('leads');
  const [companies, setCompanies] = useState([]);
  const [jobSignals, setJobSignals] = useState([]);
  const [totalCount, setTotalCount] = useState(0);
  const [rfps, setRfps] = useState([]);

  const loadRFPs = async () => {
    try {
      const resp = await fetch('http://localhost:8000/api/v1/crawler/rfp-results?limit=100');
      if (!resp.ok) return;
      const data = await resp.json();
      setRfps(data.rfps || []);
    } catch(e) { console.warn('RFP laden fehlgeschlagen', e); }
  };
  const [loading, setLoading] = useState(true);
  const [selected, setSelected] = useState(null);
  const [search, setSearch] = useState('');
  const [filters, setFilters] = useState({ country:[], category:[], priority:[], status:[], hasJobs:null, hasContacts:null });
  const [sort, setSort] = useState({ by:'score', dir:'desc' });
const [page, setPage] = useState(1);
const [pageNum, setPageNum] = useState(1);
  const PAGE_SIZE = 50;

  useEffect(() => {
    async function load() {
      try {
        setLoading(true);
        const url = new URL('http://localhost:8000/api/v1/companies');
        url.searchParams.set('page_size', '200');
        url.searchParams.set('sort_by', sort.by);
        url.searchParams.set('sort_dir', sort.dir);
        url.searchParams.set('page', String(pageNum));
        if (search) url.searchParams.set('search', search);
        filters.country.forEach(v => url.searchParams.append('country', v));
        filters.category.forEach(v => url.searchParams.append('category', v));
        filters.priority.forEach(v => url.searchParams.append('priority', v));
        filters.status.forEach(v => url.searchParams.append('status', v));
        if (filters.hasJobs === true) url.searchParams.set('has_open_jobs', 'true');
        const resp = await fetch(url.toString());
        if (!resp.ok) throw new Error();
        const data = await resp.json();
        setCompanies(data.items && data.items.length > 0 ? data.items : MOCK_COMPANIES);
        setTotalCount(data.total || 0);
      } catch(e) {
        setCompanies(MOCK_COMPANIES);
        setTotalCount(MOCK_COMPANIES.length);
      } finally {
        setLoading(false);
      }
    }
    load();
  }, [JSON.stringify(filters), search, sort.by, sort.dir, page]);

  useEffect(() => {
    if (view !== 'jobs') return;
    async function loadJobs() {
      try {
        const resp = await fetch('http://localhost:8000/api/v1/jobs/signals?limit=200');
        if (!resp.ok) throw new Error();
        const data = await resp.json();
        setJobSignals(data);
      } catch(e) { console.warn('Job Signals nicht geladen', e); }
    }
    loadJobs();
  }, [view]);

  // Server macht Filtering — direkt nutzen
  const filtered = companies;
  const pages = Math.ceil(totalCount / PAGE_SIZE);
  const visible = companies;

  function toggleFilter(key, val) {
    setFilters(f => {
      const arr = f[key];
      return { ...f, [key]: arr.includes(val) ? arr.filter(x=>x!==val) : [...arr, val] };
    });
    setPageNum(1);
  }
  function handleSort(col) {
    setSort(s => ({ by:col, dir: s.by===col && s.dir==='desc' ? 'asc' : 'desc' }));
  }
  function handleStatusChange(id, status) {
    setCompanies(cs => cs.map(c => c.id===id ? {...c, status} : c));
    if (selected?.id === id) setSelected(s => ({...s, status}));
  }

  const cols = [
    { key:'name', label:'Unternehmen', w:200 },
    { key:'category', label:'Kategorie', w:110 },
    { key:'country', label:'Land', w:55 },
    { key:'size', label:'Größe', w:80 },
    { key:'revenue_approx_eur', label:'Umsatz ca.', w:100 },
    { key:'priority', label:'Prio', w:55 },
    { key:'status', label:'Status', w:105 },
    { key:'score', label:'Score', w:100 },
    { key:'contacts_count', label:'Kontakte', w:75 },
    { key:'has_open_jobs', label:'Jobs', w:65 },
    { key:'updated_at', label:'Geändert', w:85 },

  const PRIORITIES = ['vip','high','medium','low'];

  if (screen === 'landing') {

      <div className="landing">

            <div className="filter-chip-wrap">

                    <td><span className="badge" style={{background:'var(--red-bg)',color:'var(--red)'}}>{r.source}</span></td>
                    <td><span style={{fontSize:12,color:'var(--dim)'}}>{r.contracting_authority||'—'}</span></td>
                    <td><span style={{fontSize:12,color:'var(--dim)'}}>{r.country||'—'}</span></td>
                    <td><span style={{fontSize:11,padding:'2px 6px',background:'var(--amber-bg)',color:'var(--amber)',borderRadius:4}}>{r.keyword_matched}</span></td>
                    <td><span style={{fontSize:11,color:'var(--muted)',fontFamily:'var(--font-mono)'}}>{r.published_at||'—'}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
        {view === 'jobs' && (
          <div className="table-wrap">
            <table>
              <thead>
                <tr>
                  <th style={{width:260}}>Unternehmen</th>
                  <th style={{width:300}}>Stelle</th>
                  <th style={{width:100}}>Plattform</th>
                  <th style={{width:120}}>Standort</th>
                  <th style={{width:90}}>Signal</th>
                  <th style={{width:100}}>Datum</th>
                </tr>
              </thead>
              <tbody>
                {jobSignals.length === 0 && (
                  <tr className="loading-row"><td colSpan={6}>
                    Noch keine Job-Signale gefunden. Indeed RSS wird täglich automatisch abgefragt.
                  </td></tr>
                )}
                {jobSignals.map(j => (
                  <tr key={j.id}>
                    <td><div className="company-name">{j.company_id}</div></td>
                    <td><div className="company-name">
                      {j.is_growth_signal && <span style={{color:'var(--green)',marginRight:5}}>▲</span>}
                      <a href={j.external_url} target="_blank" style={{color:'var(--text)',textDecoration:'none'}}>{j.title}</a>
                    </div></td>
                    <td><span style={{fontSize:11,color:'var(--dim)',fontFamily:'var(--font-mono)'}}>{j.platform}</span></td>
                    <td><span style={{fontSize:11,color:'var(--dim)'}}>{j.location || '—'}</span></td>
                    <td>{j.is_growth_signal ? <span className="job-signal">▲ Wachstum</span> : <span className="job-signal none">—</span>}</td>
                    <td><span style={{fontSize:11,color:'var(--muted)',fontFamily:'var(--font-mono)'}}>{j.platform_posted_at || '—'}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
        {view === 'leads' && <>
          <div className="table-wrap">
            <table>
              <thead>
                <tr>
                  {cols.map(col => (
                    <th key={col.key} style={{width:col.w}} className={sort.by===col.key?'sorted':''}
                      onClick={()=>handleSort(col.key)}>
                      {col.label}{sortArrow(col.key)}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {visible.length === 0 && (
                  <tr className="loading-row"><td colSpan={cols.length}>Keine Ergebnisse</td></tr>
                )}
                {visible.map(c => (
                  <tr key={c.id} className={selected?.id===c.id?'selected':''} onClick={()=>setSelected(c)}>
                    <td>
                      <div className="company-name">{c.name}</div>
                      <div className="company-sub">{c.city || '—'}</div>
                    </td>
                    <td><CatBadge cat={c.category} /></td>
                    <td><span className="country-flag">{COUNTRY_FLAGS[c.country]}</span></td>
                    <td style={{fontSize:11,color:'var(--dim)',fontFamily:'var(--font-mono)'}}>{c.size||'—'}</td>
                    <td><span className="revenue">{fmtRevenue(c.revenue_approx_eur)}</span></td>
                    <td><PrioDot prio={c.priority} /></td>
                    <td><StatusBadge status={c.status} /></td>
                    <td><ScoreBar score={c.score} /></td>
                    <td>
                      {(c.contacts_count || 0) > 0
                        ? <span style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--green)',fontWeight:500,cursor:'pointer'}} onClick={e=>{e.stopPropagation();setSelected(c);}}>👤 {c.contacts_count}</span>
                        : <span style={{fontSize:11,color:'var(--muted)'}}>—</span>
                      }
                    </td>
                    <td><JobSignal count={c.open_jobs_count} has={c.has_open_jobs} /></td>
                    <td style={{fontSize:11,color:'var(--muted)',fontFamily:'var(--font-mono)'}}>{fmtDate(c.updated_at)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {selected && (
            <DetailPanel
              company={selected}
              onClose={()=>setSelected(null)}
              onStatusChange={handleStatusChange}
            />
          )}
        </>}
        </div>

        {/* Pagination */}
        <div className="pagination">
          <span className="page-info">{(pageNum-1)*PAGE_SIZE+1}–{Math.min(page*PAGE_SIZE,totalCount)} von {totalCount}</span>
          <div className="page-btns">
            <button className="page-btn" disabled={pageNum===1} onClick={()=>setPageNum(p=>p-1)}>‹</button>
            {Array.from({length:Math.min(pages,7)}, (_,i)=>i+1).map(p=>(
              <button key={p} className={`page-btn ${p===pageNum?'current':''}`} onClick={()=>setPageNum(p)}>{p}</button>
            ))}
            <button className="page-btn" disabled={pageNum>=pages} onClick={()=>setPageNum(p=>p+1)}>›</button>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
