<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>JSR Belege</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&family=DM+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f0f4ff;--card:#fff;--blue:#2563eb;--blue-bg:#eff6ff;
  --green:#16a34a;--green-bg:#f0fdf4;
  --amber:#d97706;--amber-bg:#fffbeb;
  --red:#dc2626;--red-bg:#fef2f2;
  --gray:#6b7280;--border:#e5e7eb;--text:#111827;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --r:12px;--r-lg:18px;
}
html,body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;}
.hdr{background:linear-gradient(135deg,#1e3a8a,#2563eb);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.wrap{max-width:600px;margin:0 auto;padding:14px;}
.co-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;margin-bottom:14px;}
.co-bar::-webkit-scrollbar{display:none;}
.co-btn{flex-shrink:0;padding:7px 14px;border-radius:40px;border:2px solid var(--border);background:var(--card);cursor:pointer;font-size:12px;font-weight:700;color:var(--gray);font-family:var(--font);}
.co-btn.on{border-color:var(--blue);background:var(--blue);color:#fff;}
.mo-strip{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;margin-bottom:16px;}
.mo-strip::-webkit-scrollbar{display:none;}
.mo-btn{flex-shrink:0;padding:5px 12px;border-radius:40px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;font-size:11px;font-weight:600;color:var(--gray);text-align:center;font-family:var(--font);}
.mo-btn.on{border-color:var(--blue);background:var(--blue-bg);color:var(--blue);}
.mo-dot{width:5px;height:5px;border-radius:50%;margin:3px auto 0;background:transparent;}
.scan-btn{width:100%;padding:18px;border-radius:var(--r-lg);border:none;cursor:pointer;background:linear-gradient(135deg,#1d4ed8,#7c3aed);color:#fff;font-size:17px;font-weight:800;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 20px rgba(37,99,235,.35);margin-bottom:8px;}
.folder-btn{width:100%;padding:14px;border-radius:var(--r-lg);border:2px solid var(--blue);cursor:pointer;background:var(--blue-bg);color:var(--blue);font-size:14px;font-weight:700;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px;}
.card{background:var(--card);border-radius:var(--r-lg);box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:12px;overflow:hidden;}
.card-hdr{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-ttl{font-size:13px;font-weight:700;}
.alert{margin-bottom:10px;border-radius:var(--r);padding:10px 12px;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:500;}
.alert-amber{background:var(--amber-bg);border:1px solid rgba(217,119,6,.2);color:#92400e;}
.alert-red{background:var(--red-bg);border:1px solid rgba(220,38,38,.2);color:#991b1b;}
.alert-blue{background:var(--blue-bg);border:1px solid rgba(37,99,235,.15);color:#1e40af;}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px 12px;}
.kpi{text-align:center;padding:8px 4px;border-radius:var(--r);background:var(--bg);}
.kpi-v{font-size:20px;font-weight:800;font-family:var(--mono);}
.kpi-l{font-size:10px;color:var(--gray);margin-top:2px;line-height:1.2;}
.beleg-row{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer;}
.beleg-row:last-child{border-bottom:none;}
.thumb{width:40px;height:40px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--bg);}
.thumb-ph{width:40px;height:40px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.beleg-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.beleg-meta{font-size:11px;color:var(--gray);margin-top:1px;}
.upl-zone{padding:20px 14px;text-align:center;cursor:pointer;border:2px dashed var(--border);border-radius:var(--r);margin:10px 12px;background:var(--bg);}
.upl-zone.done{border-color:var(--green);background:var(--green-bg);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.sheet{background:var(--card);border-radius:18px 18px 0 0;width:100%;max-width:600px;max-height:88vh;overflow-y:auto;padding:18px;}
.handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.proc{position:fixed;inset:0;background:rgba(17,24,39,.88);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
.match-row{padding:9px 12px;border-radius:var(--r);border:1.5px solid var(--border);margin-bottom:7px;cursor:pointer;}
.match-row:hover{border-color:var(--blue);background:var(--blue-bg);}
.btn{padding:10px 14px;border-radius:var(--r);border:none;cursor:pointer;font-size:13px;font-weight:700;font-family:var(--font);}
.btn-blue{background:var(--blue);color:#fff;}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--gray);}
.btn-red{background:var(--red-bg);color:var(--red);border:1.5px solid transparent;}
</style>
</head>
<body>
<div id="app"></div>
<script>
var COMPANIES = [
  {id:'pk1',name:'Parklane GmbH',short:'PL1'},
  {id:'pk2',name:'Parklane Zwei GmbH',short:'PL2'},
  {id:'pk3',name:'Parklane Drei GmbH',short:'PL3'},
  {id:'pk4',name:'Parklane Vier GmbH',short:'PL4'},
];
var SERVER = 'http://localhost:4001';

function getMonths(){
  var list=[],now=new Date();
  for(var i=0;i<18;i++){
    var d=new Date(now.getFullYear(),now.getMonth()-i,1);
    list.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));
  }
  return list;
}
function fmtM(m){var p=m.split('-');return new Date(p[0],p[1]-1,1).toLocaleDateString('de-DE',{month:'short',year:'2-digit'});}
function fmtML(m){var p=m.split('-');return new Date(p[0],p[1]-1,1).toLocaleDateString('de-DE',{month:'long',year:'numeric'});}
function eur(v){return Number(v||0).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+'\u00a0\u20ac';}
function parseDM(s){
  if(!s) return null;
  var m=s.match(/(\d{1,2})\.(\d{1,2})\.(\d{2,4})/);
  if(m){var y=m[3].length===2?'20'+m[3]:m[3];return y+'-'+m[2].padStart(2,'0');}
  var m2=s.match(/(\d{4})-(\d{2})-\d{2}/);
  if(m2) return m2[1]+'-'+m2[2];
  return null;
}
function nmatch(a,b){
  if(!a||!b) return 0;
  a=a.toLowerCase().replace(/[^a-z0-9]/g,'');
  b=b.toLowerCase().replace(/[^a-z0-9]/g,'');
  if(!a||!b) return 0;
  if(a===b) return 1;
  var sh=a.length<b.length?a:b,lo=a.length<b.length?b:a;
  if(lo.indexOf(sh.slice(0,4))>=0) return 0.7;
  return 0;
}

var S = {
  company: localStorage.getItem('jsr_bl_co')||'pk1',
  month: (function(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');})(),
  apiKey: localStorage.getItem('jsr_anthropic_key')||'',
  processing: false,
  procMsg: '',
  modal: null,
  belege: {},
  bankTx: {},
  ccTx: {},
};

function loadD(co){
  try{S.belege=JSON.parse(localStorage.getItem('jsr_bl_b_'+co)||'{}');}catch(e){S.belege={};}
  try{S.bankTx=JSON.parse(localStorage.getItem('jsr_bl_k_'+co)||'{}');}catch(e){S.bankTx={};}
  try{S.ccTx=JSON.parse(localStorage.getItem('jsr_bl_c_'+co)||'{}');}catch(e){S.ccTx={};}
}
loadD(S.company);

function saveD(){
  localStorage.setItem('jsr_bl_b_'+S.company,JSON.stringify(S.belege));
  localStorage.setItem('jsr_bl_k_'+S.company,JSON.stringify(S.bankTx));
  localStorage.setItem('jsr_bl_c_'+S.company,JSON.stringify(S.ccTx));
}

function autoMatch(mo){
  var mb=(S.belege[mo]||[]).slice();
  var allT=(S.bankTx[mo]||[]).concat(S.ccTx[mo]||[]);
  if(!mb.length) return;
  var used={};
  mb.forEach(function(b){if(b.status==='matched'||b.status==='manual') used[b.tx_id]=true;});
  mb.forEach(function(b,i){
    if(b.status==='matched'||b.status==='manual') return;
    var amt=Math.abs(b.betrag||0);
    if(!amt){mb[i]=Object.assign({},b,{status:'unmatched',candidates:[]});return;}
    var cands=[];
    allT.forEach(function(tx){
      if(used[tx.id]) return;
      var ta=Math.abs(tx.amount||0),diff=Math.abs(ta-amt);
      var as=diff<0.05?1:diff<1?0.75:diff<5?0.3:0;
      if(!as) return;
      var ns=nmatch(b.firma||'',tx.creditor||tx.desc||'');
      var sc=as*0.7+ns*0.3;
      if(sc>0.35) cands.push({tx:tx,score:sc,as:as});
    });
    cands.sort(function(a,b){return b.score-a.score;});
    if(!cands.length){mb[i]=Object.assign({},b,{status:'unmatched',candidates:[]});}
    else if(cands[0].score>=0.85&&cands[0].as===1){used[cands[0].tx.id]=true;mb[i]=Object.assign({},b,{status:'matched',tx_id:cands[0].tx.id,candidates:[]});}
    else{mb[i]=Object.assign({},b,{status:'uncertain',candidates:cands.slice(0,3)});}
  });
  S.belege[mo]=mb;
}

function parseCSV(text){
  var lines=text.replace(/\r/g,'').split('\n').filter(function(l){return l.trim();});
  if(!lines.length) return [];
  var sep=lines[0].indexOf(';')>=0?';':',';
  var hdr=lines[0].split(sep).map(function(h){return h.replace(/"/g,'').toLowerCase().trim();});
  var rows=[];
  for(var i=1;i<lines.length;i++){
    var vals=lines[i].split(sep).map(function(v){return v.replace(/^"|"$/g,'').trim();});
    var row={};
    hdr.forEach(function(h,j){row[h]=vals[j]||'';});
    var date=row['buchungstag']||row['date']||row['datum']||row['valuta']||'';
    var desc=row['verwendungszweck']||row['description']||row['buchungstext']||row['text']||'';
    var ams=(row['betrag']||row['amount']||row['umsatz']||'0').replace(',','.').replace(/[^0-9.-]/g,'');
    var amount=parseFloat(ams)||0;
    var cred=row['beguenstigter/zahlungspflichtiger']||row['empfaenger']||row['name']||row['creditor']||'';
    if((date||desc)&&amount!==0) rows.push({id:'tx'+Date.now()+'_'+i,date:date,desc:desc,amount:amount,creditor:cred});
  }
  return rows;
}

function handleCSV(text,type){
  var rows=parseCSV(text);
  var bm={};
  rows.forEach(function(tx){var m=parseDM(tx.date)||S.month;if(!bm[m])bm[m]=[];bm[m].push(tx);});
  var store=type==='bank'?S.bankTx:S.ccTx;
  Object.keys(bm).forEach(function(m){
    var ex=store[m]||[],ids={};
    ex.forEach(function(t){ids[t.id]=true;});
    store[m]=ex.concat(bm[m].filter(function(t){return !ids[t.id];}));
    if(!S.belege[m]) S.belege[m]=[];
    autoMatch(m);
  });
  saveD();render();
}

function getGlobalNr(){
  var max=0;
  COMPANIES.forEach(function(c){
    try{var d=JSON.parse(localStorage.getItem('jsr_bl_b_'+c.id)||'{}');
      Object.values(d).forEach(function(arr){(arr||[]).forEach(function(b){if(b.global_nr&&b.global_nr>max)max=b.global_nr;});});
    }catch(e){}
  });
  return max+1;
}

function resizeImg(file,cb){
  var img=new Image(),url=URL.createObjectURL(file);
  img.onload=function(){
    URL.revokeObjectURL(url);
    var max=800,w=img.width,h=img.height;
    if(w>max||h>max){var r=Math.min(max/w,max/h);w=Math.round(w*r);h=Math.round(h*r);}
    var c=document.createElement('canvas');c.width=w;c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    var full=c.toDataURL('image/jpeg',0.82).split(',')[1];
    var tr=Math.min(100/w,100/h),tc=document.createElement('canvas');
    tc.width=Math.round(w*tr);tc.height=Math.round(h*tr);
    tc.getContext('2d').drawImage(img,0,0,tc.width,tc.height);
    cb(full,tc.toDataURL('image/jpeg',0.6));
  };
  img.onerror=function(){cb(null,null);};
  img.src=url;
}

function callAPI(b64,mime,thumb,fname,serverMeta,onDone){
  var xhr=new XMLHttpRequest();
  xhr.open('POST','https://api.anthropic.com/v1/messages');
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.setRequestHeader('x-api-key',S.apiKey);
  xhr.setRequestHeader('anthropic-version','2023-06-01');
  xhr.setRequestHeader('anthropic-dangerous-direct-browser-access','true');
  xhr.onload=function(){
    var m=S.month;
    try{
      var data=JSON.parse(xhr.responseText);
      if(data.error) throw new Error(data.error.message);
      var txt=(data.content||[]).map(function(c){return c.text||'';}).join('');
      var parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());
      var bm=parseDM(parsed.datum)||m;
      if(!S.belege[bm]) S.belege[bm]=[];
      var nr=getGlobalNr();
      var fs=(parsed.firma||'Unbekannt').replace(/[^a-zA-Z0-9]/g,'').slice(0,12);
      var yr=(parsed.datum||bm).slice(0,4);
      var dn='JSR-'+yr+'-'+String(nr).padStart(4,'0')+'_'+fs;
      var bl={
        id:'bl'+Date.now()+'_'+nr,filename:fname,doc_name:dn,global_nr:nr,
        dataUrl:thumb,month:bm,status:'unmatched',tx_id:null,candidates:[],
        firma:parsed.firma||'',datum:parsed.datum||'',betrag:parsed.betrag||0,
        mwst_pct:parsed.mwst_pct||0,mwst_betrag:parsed.mwst_betrag||0,
        netto:parsed.netto||0,beschreibung:parsed.beschreibung||'',kategorie:parsed.kategorie||'',
        _srv:serverMeta,
      };
      S.belege[bm].push(bl);
      autoMatch(bm);
      S.month=bm;
      // Save to server if applicable
      if(serverMeta&&serverMeta.path){
        var co=COMPANIES.find(function(c){return c.id===S.company;});
        if(co){
          var sx=new XMLHttpRequest();
          sx.open('POST',SERVER+'/save');
          sx.setRequestHeader('Content-Type','application/json');
          sx.send(JSON.stringify({company:co.name,month:bm,doc_name:dn,source_path:serverMeta.path,source_hash:serverMeta.hash,source_key:serverMeta.key}));
        }
      }
    }catch(e){
      if(!S.belege[m]) S.belege[m]=[];
      S.belege[m].push({id:'bl'+Date.now(),filename:fname,dataUrl:thumb,month:m,status:'error',error:e.message,betrag:0});
    }
    saveD();onDone();
  };
  xhr.onerror=function(){saveD();onDone();};
  var ct=[{type:mime.startsWith('image')?'image':'document',source:{type:'base64',media_type:mime,data:b64}},{type:'text',text:'Beleg als JSON (NUR JSON): {"firma":"","datum":"YYYY-MM-DD","betrag":0.00,"mwst_pct":0,"mwst_betrag":0.00,"netto":0.00,"waehrung":"EUR","beschreibung":"","kategorie":"Essen/Reise/Buero/Tanken/Sonstiges"}'}];
  xhr.send(JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,messages:[{role:'user',content:ct}]}));
}

function processFiles(files){
  if(!S.apiKey){S.modal='key';render();return;}
  var idx=0;
  S.processing=true;S.procMsg='Starte...';render();
  function next(){
    if(idx>=files.length){S.processing=false;saveD();render();return;}
    var file=files[idx];idx++;
    S.procMsg='Lese Beleg '+idx+'/'+files.length+': '+file.name;render();
    resizeImg(file,function(b64,thumb){
      if(!b64){
        var m=S.month;
        if(!S.belege[m]) S.belege[m]=[];
        S.belege[m].push({id:'bl'+Date.now(),filename:file.name,dataUrl:null,month:m,status:'error',error:'Konnte nicht gelesen werden',betrag:0});
        saveD();next();return;
      }
      callAPI(b64,'image/jpeg',thumb,file.name,null,next);
    });
  }
  next();
}

function scanFolder(){
  var co=COMPANIES.find(function(c){return c.id===S.company;});
  if(!co) return;
  if(!S.apiKey){S.modal='key';render();return;}
  var xhr=new XMLHttpRequest();
  xhr.open('GET',SERVER+'/scan?company='+encodeURIComponent(co.name));
  xhr.timeout=3000;
  xhr.onload=function(){
    var d=JSON.parse(xhr.responseText);
    if(!d.files||!d.files.length){alert('Keine neuen Dateien in:\n~/Downloads/JSR-Belege/'+co.name+'/Eingang/');return;}
    processServerFiles(d.files);
  };
  xhr.onerror=function(){alert('Server nicht erreichbar.\nBitte starten:\n\npython3 beleg_server.py');};
  xhr.ontimeout=function(){alert('Server nicht erreichbar.\nBitte starten:\n\npython3 beleg_server.py');};
  xhr.send();
}

function processServerFiles(files){
  var idx=0;
  S.processing=true;S.procMsg='Starte...';render();
  function next(){
    if(idx>=files.length){S.processing=false;saveD();render();return;}
    var f=files[idx];idx++;
    S.procMsg='Lese '+idx+'/'+files.length+': '+f.name;render();
    var xhr=new XMLHttpRequest();
    xhr.open('GET',SERVER+'/file?path='+encodeURIComponent(f.path));
    xhr.timeout=10000;
    xhr.onload=function(){
      var fd=JSON.parse(xhr.responseText);
      if(!fd.base64){saveD();next();return;}
      if(fd.mime.startsWith('image/')){
        var img=new Image();
        img.onload=function(){
          var max=800,w=img.width,h=img.height;
          if(w>max||h>max){var r=Math.min(max/w,max/h);w=Math.round(w*r);h=Math.round(h*r);}
          var c=document.createElement('canvas');c.width=w;c.height=h;
          c.getContext('2d').drawImage(img,0,0,w,h);
          var b64=c.toDataURL('image/jpeg',0.82).split(',')[1];
          var tr=Math.min(100/w,100/h),tc=document.createElement('canvas');
          tc.width=Math.round(w*tr);tc.height=Math.round(h*tr);
          tc.getContext('2d').drawImage(img,0,0,tc.width,tc.height);
          callAPI(b64,'image/jpeg',tc.toDataURL('image/jpeg',0.6),f.name,f,next);
        };
        img.onerror=function(){callAPI(fd.base64,fd.mime,null,f.name,f,next);};
        img.src='data:'+fd.mime+';base64,'+fd.base64;
      } else {
        callAPI(fd.base64,fd.mime,null,f.name,f,next);
      }
    };
    xhr.onerror=function(){saveD();next();};
    xhr.ontimeout=function(){saveD();next();};
    xhr.send();
  }
  next();
}

function confirmMatch(bid,txid){
  var mb=S.belege[S.month]||[];
  mb.forEach(function(b,i){if(b.id===bid)mb[i]=Object.assign({},b,{status:'matched',tx_id:txid,candidates:[]});});
  S.modal=null;saveD();render();
}
function markManual(bid,note){
  var mb=S.belege[S.month]||[];
  mb.forEach(function(b,i){if(b.id===bid)mb[i]=Object.assign({},b,{status:'manual',manual_note:note,tx_id:null,candidates:[]});});
  S.modal=null;saveD();render();
}
function unmatch(bid){
  var mb=S.belege[S.month]||[];
  mb.forEach(function(b,i){if(b.id===bid)mb[i]=Object.assign({},b,{status:'unmatched',tx_id:null,candidates:[]});});
  S.modal=null;saveD();render();
}
function delBeleg(bid){
  if(!confirm('Beleg loeschen?')) return;
  S.belege[S.month]=(S.belege[S.month]||[]).filter(function(b){return b.id!==bid;});
  S.modal=null;saveD();render();
}

function dotColor(m){
  var mb=S.belege[m]||[];
  if(!mb.length) return 'transparent';
  if(mb.some(function(b){return b.status==='unmatched'||b.status==='error';})) return 'var(--red)';
  if(mb.some(function(b){return b.status==='uncertain';})) return 'var(--amber)';
  return 'var(--green)';
}

function el(tag,attrs,kids){
  var e=document.createElement(tag);
  Object.keys(attrs||{}).forEach(function(k){
    if(k==='cls') e.className=attrs[k];
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else if(k==='style'&&typeof attrs[k]==='object') Object.assign(e.style,attrs[k]);
    else e.setAttribute(k,attrs[k]);
  });
  (kids||[]).forEach(function(c){if(c!=null) e.appendChild(typeof c==='string'?document.createTextNode(c):c);});
  return e;
}
function d(cls,kids,style){return el('div',{cls:cls,style:style||{}},kids);}

      el('p',{style:{fontSize:12,color:'var(--gray)',marginBottom:12,lineHeight:'1.6'}},['Lokal gespeichert. console.anthropic.com > API Keys']),

        sc.push(d('',[ el('div',{style:{fontWeight:700,color:'var(--green)',marginBottom:4}},['Zugeordnet']), el('div',{},[mtx.date+' - '+(mtx.creditor||mtx.desc.slice(0,35))]), el('div',{style:{fontFamily:'var(--mono)',fontWeight:700}},[eur(Math.abs(mtx.amount))]) ],{padding:'10px 12px',background:'var(--green-bg)',borderRadius:'var(--r)',marginBottom:12,fontSize:12}));

      if(b.status==='manual'&&!mtx){

        b.candidates.forEach(function(c){
          var row=d('match-row',[ el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},[el('div',{},[el('div',{style:{fontSize:12,fontWeight:600}},[c.tx.creditor||c.tx.desc.slice(0,30)]),el('div',{style:{fontSize:11,color:'var(--gray)'}},[c.tx.date+' - '+Math.round(c.score*100)+'%'])]),el('div',{style:{fontFamily:'var(--mono)',fontWeight:700,fontSize:13}},[eur(Math.abs(c.tx.amount))])]) ]);
          var tid=c.tx.id;row.addEventListener('click',function(){confirmMatch(b.id,tid);});
          sc.push(row);
        });
      }
      if(b.status==='unmatched'||b.status==='uncertain'||b.status==='error'){
        var avail=allT.filter(function(tx){return !mb.some(function(x){return x.tx_id===tx.id&&x.id!==b.id;});});
        if(avail.length){
          sc.push(el('div',{style:{fontSize:11,fontWeight:700,color:'var(--gray)',margin:'12px 0 6px'}},['Manuell zuordnen:']));
          var scr=d('',avail.slice(0,8).map(function(tx){
            var row=d('match-row',[el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},[el('div',{},[el('div',{style:{fontSize:12,fontWeight:500}},[tx.creditor||tx.desc.slice(0,30)]),el('div',{style:{fontSize:10,color:'var(--gray)'}},[tx.date])]),el('div',{style:{fontFamily:'var(--mono)',fontSize:12,fontWeight:700}},[eur(Math.abs(tx.amount))])])]);
            row.addEventListener('click',function(){confirmMatch(b.id,tx.id);});
            return row;
          }),{maxHeight:160,overflowY:'auto',marginBottom:8});
          sc.push(scr);
        }
        sc.push(d('',[ btn('btn-outline','Bar bezahlt',function(){markManual(b.id,'Bar bezahlt');}), btn('btn-outline','Privat',function(){markManual(b.id,'Privat');}), btn('btn-red','Loeschen',function(){delBeleg(b.id);}) ],{display:'flex',gap:8,flexDirection:'column',marginTop:8}));
      }
      var bov=d('overlay',[d('sheet',[d('handle',[]),...sc])]);
      bov.addEventListener('click',function(e){if(e.target===bov){S.modal=null;render();}});
      root.appendChild(bov);
    }
  }

  // HEADER
  var hdr=el('div',{cls:'hdr'},[
    d('',[
      el('a',{href:'index.html',style:{color:'rgba(255,255,255,.5)',fontSize:18,textDecoration:'none',marginRight:10}},['<']),
      el('span',{style:{background:'rgba(255,255,255,.2)',borderRadius:8,padding:'4px 10px',fontSize:13,fontWeight:800,color:'#fff',fontFamily:'var(--mono)',marginRight:10}},['JSR']),
      el('span',{style:{color:'#fff',fontSize:15,fontWeight:700}},['Belege']),
    ],{display:'flex',alignItems:'center'}),
    el('button',{style:{padding:'5px 10px',borderRadius:20,border:'none',cursor:'pointer',fontSize:11,fontWeight:700,fontFamily:'var(--font)',background:S.apiKey?'rgba(22,163,74,.2)':'rgba(239,68,68,.2)',color:S.apiKey?'#86efac':'#fca5a5'},onClick:function(){S.modal='key';render();}},[ S.apiKey?'KI aktiv':'Key fehlt' ]),
  ]);

  var wrap=d('wrap',[]);

    return b2;
  }));
  wrap.appendChild(cb);
  wrap.appendChild(el('div',{style:{fontSize:13,fontWeight:700,color:'var(--blue)',marginBottom:10}},[coName]));

  // Month strip
  var ms=d('mo-strip',months.map(function(m){
    var dot=el('div',{cls:'mo-dot',style:{background:dotColor(m)}});

  // Alerts
  if(uncertain>0) wrap.appendChild(d('alert alert-amber',[el('span',{style:{fontSize:16}},['!']),el('div',{},[el('strong',[],[uncertain+' Belege']),' warten auf Bestaetigung.'])]));
  if(unmatched>0) wrap.appendChild(d('alert alert-red',[el('span',{style:{fontSize:16}},['x']),el('div',{},[el('strong',[],[unmatched+' Belege']),' nicht zugeordnet.'+( !hasBank&&!hasCC?' Kein Kontoauszug - wird nach CSV-Upload automatisch verarbeitet.':' Bitte manuell zuordnen.')])]));
  if(!hasBank&&!hasCC&&mb.length>0) wrap.appendChild(d('alert alert-blue',[el('span',{style:{fontSize:16}},['i']),el('div',{},[fmtML(S.month)+': Kein Kontoauszug. Belege werden nach Upload automatisch zugeordnet.'])]));

  var fi=el('input',{type:'file',accept:'image/*,application/pdf',multiple:'true',capture:'environment',style:{display:'none'}});

  sb.addEventListener('click',function(){fi.click();});
  wrap.appendChild(sb);
  wrap.appendChild(fi);

  // Folder scan button
  var fb=el('button',{cls:'folder-btn'},['Eingang scannen & verarbeiten']);
  fb.addEventListener('click',scanFolder);
  wrap.appendChild(fb);
  wrap.appendChild(el('div',{style:{fontSize:10,color:'var(--gray)',textAlign:'center',fontFamily:'var(--mono)',marginBottom:12,marginTop:-6}},['~/Downloads/JSR-Belege/'+coName+'/Eingang/']));

  // KPI
  if(mb.length){
    wrap.appendChild(d('card',[d('kpi-row',[
      d('kpi',[d('kpi-v',[String(mb.length)]),d('kpi-l',['Gesamt'])]),
      d('kpi',[el('div',{cls:'kpi-v',style:{color:'var(--green)'}},[String(matched)]),d('kpi-l',['OK'])]),
      d('kpi',[el('div',{cls:'kpi-v',style:{color:'var(--amber)'}},[String(uncertain)]),d('kpi-l',['Pruefen'])]),
      d('kpi',[el('div',{cls:'kpi-v',style:{color:'var(--red)'}},[String(unmatched)]),d('kpi-l',['Fehlt'])]),
    ])]));
  }

  // Belege list
  if(mb.length){
    var sorted=mb.slice().sort(function(a,b2){var o={uncertain:0,unmatched:1,error:2,matched:3,manual:3};return (o[a.status]||0)-(o[b2.status]||0);});
    var lc=d('card',[
      d('card-hdr',[el('span',{cls:'card-ttl'},[fmtML(S.month)]),el('span',{style:{fontSize:11,color:'var(--gray)'}},[mb.length+' Belege'])]),
      ...sorted.map(function(b2){
        var sc2=b2.status==='matched'||b2.status==='manual'?'var(--green)':b2.status==='uncertain'?'var(--amber)':'var(--red)';
        var sb2=b2.status==='matched'||b2.status==='manual'?'var(--green-bg)':b2.status==='uncertain'?'var(--amber-bg)':'var(--red-bg)';
        var si=b2.status==='matched'||b2.status==='manual'?'OK':b2.status==='uncertain'?'Pruefen':'Fehlt';
        var thumb2=b2.dataUrl?el('img',{src:b2.dataUrl,cls:'thumb'}):d('thumb-ph',['?']);
        var row=d('beleg-row',[
          thumb2,
          d('',[ el('div',{cls:'beleg-name'},[b2.firma||b2.filename]), el('div',{cls:'beleg-meta'},[(b2.datum?b2.datum+' ':'')+( b2.kategorie||'')+(b2.doc_name?' - '+b2.doc_name:'')]) ],{flex:'1',minWidth:0}),
          d('',[ b2.betrag?el('div',{style:{fontFamily:'var(--mono)',fontSize:12,fontWeight:700,textAlign:'right',marginBottom:3}},[eur(b2.betrag)]):null, el('span',{style:{display:'inline-block',padding:'2px 8px',borderRadius:20,fontSize:10,fontWeight:700,background:sb2,color:sc2}},[si]) ],{display:'flex',flexDirection:'column',alignItems:'flex-end',flexShrink:0}),
        ]);

    wrap.appendChild(lc);
  } else {
    wrap.appendChild(d('',[ el('div',{style:{fontSize:40,marginBottom:10}},['?']), el('div',{style:{fontSize:14,fontWeight:700,marginBottom:4}},['Noch keine Belege']), el('div',{style:{fontSize:12,color:'var(--gray)'}},['Foto-Upload oder Ordner scannen']) ],{textAlign:'center',padding:'36px 20px',color:'var(--gray)'}));

  bi.addEventListener('change',function(){var f=bi.files[0];if(!f) return;var r=new FileReader();r.onload=function(e){handleCSV(e.target.result.replace(/\uFEFF/,''),'bank');};r.readAsText(f,'UTF-8');bi.value='';});
  var ci=el('input',{type:'file',accept:'.csv,.txt',style:{display:'none'}});
  ci.addEventListener('change',function(){var f=ci.files[0];if(!f) return;var r=new FileReader();r.onload=function(e){handleCSV(e.target.result.replace(/\uFEFF/,''),'cc');};r.readAsText(f,'UTF-8');ci.value='';});

  var bz=d('upl-zone'+(hasBank?' done':''),[ el('div',{style:{fontSize:24,marginBottom:6}},['B']), el('div',{style:{fontSize:13,fontWeight:700,marginBottom:4}},[hasBank?'Bankauszug geladen':'Bankauszug hochladen']), el('div',{style:{fontSize:11,color:'var(--gray)'}},['CSV vom Online-Banking']), hasBank?el('div',{style:{fontSize:11,color:'var(--green)',fontWeight:600,marginTop:6}},[(S.bankTx[S.month]||[]).length+' Buchungen']):null ]);
  bz.addEventListener('click',function(){bi.click();});
  var cz=d('upl-zone'+(hasCC?' done':''),[ el('div',{style:{fontSize:24,marginBottom:6}},['K']), el('div',{style:{fontSize:13,fontWeight:700,marginBottom:4}},[hasCC?'Kreditkartenauszug geladen':'Kreditkartenauszug hochladen']), el('div',{style:{fontSize:11,color:'var(--gray)'}},['CSV vom Kreditkartenanbieter']), hasCC?el('div',{style:{fontSize:11,color:'var(--green)',fontWeight:600,marginTop:6}},[(S.ccTx[S.month]||[]).length+' Buchungen']):null ]);
  cz.addEventListener('click',function(){ci.click();});

  var ac=d('card',[
    d('card-hdr',[el('span',{cls:'card-ttl'},['Kontoauszuege - '+fmtML(S.month)])]),
    d('',[ bz,cz,bi,ci, (hasBank||hasCC)?btn('btn-outline','Zuordnung neu starten',function(){autoMatch(S.month);saveD();render();}):null ],{padding:'0 0 8px'}),
  ]);
  wrap.appendChild(ac);
  root.appendChild(wrap);
}

render();
</script>
