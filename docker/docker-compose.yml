services:

  postgres:
    image: postgres:16-alpine
    container_name: tourism_leads_db
    environment:
      POSTGRES_USER: leads
      POSTGRES_PASSWORD: leads
      POSTGRES_DB: tourism_leads
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leads -d tourism_leads"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tourism_leads_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
